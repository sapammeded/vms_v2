    <style>

        .toast-msg { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; font-size: 0.8rem; animation: fadeIn 0.2s; max-width: 90%; }
        .toast-msg.success { background: #1f4e4a; }
        .toast-msg.error { background: #b91c1c; }
        .toast-msg.warning { background: #d97706; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 3000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .table-wrap { overflow-x: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 16px; background: #f8fafc; color: #1f4e4a; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px 16px; border-bottom: 1px solid #edf2f7; }
        #cameraPreview { width: 100%; max-width: 500px; background: #000; border-radius: 24px; overflow: hidden; min-height: 200px; margin: 0 auto; }
        @media (max-width: 780px) {
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; width: 100%; padding: 16px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
        .queue-status { position: fixed; bottom: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.8); color: #ff9800; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-family: monospace; pointer-events: none; }
        .license-badge { background: #fbbf24; color: #92400e; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; margin-left: 12px; }
        body.disable-interaction { pointer-events: none; opacity: 0.7; }
        .qr-reader-region { margin: 0 auto; }

" height="90"></canvas></div><div class="form-card"><canvas id="categoryChart" height="90"></canvas></div></div><div id="registerPane" class="tab-pane"><div class="form-card"><div class="grid-2"><div class="input-field"><label>Full name</label><input type="text" id="regName" placeholder="John Carter"></div><div class="input-field"><label>Company</label><input type="text" id="regCompany" placeholder="PT Nusantara"></div><div class="input-field"><label>Category</label><select id="regCategory"><option value="UMUM">UMUM</option><option value="VIP">VIP</option><option value="VVIP">VVIP</option></select></div><div class="input-field"><label>Purpose</label><select id="regPurpose"><option>Meeting</option><option>Interview</option><option>Service</option><option>Lainnya</option></select><input type="text" id="regCustomPurpose" placeholder="Other purpose" style="margin-top:8px;"></div><div class="input-field"><label>PIC</label><input type="text" id="regPic" placeholder="Budi Santoso"></div><div class="input-field"><label>Department</label><input type="text" id="regDept" placeholder="IT / HR"></div><div class="input-field"><label>Start date</label><input type="date" id="regStartDate"></div><div class="input-field"><label>Expired date</label><input type="date" id="regExpDate"></div><div class="input-field"><label>Photo</label><input type="file" id="regPhotoFile" accept="image/*"><img id="previewPhotoThumb" width="50" style="margin-top:8px; border-radius:12px;"></div></div><div style="display:flex; gap:16px; margin-top:24px;"><button id="walkinBtn">⚡ Walk-in</button><button id="generateQRBtn">🔐 Generate QR</button></div></div></div><div id="scannerPane" class="tab-pane">

       <thead><tr><th><input type="checkbox" id="checkAllMaster"></th><th>REG</th><th>Foto</th><th>Nama</th><th>Perusahaan</th><th>Kategori</th><th>Status</th><th>Aksi/PDF</th><th>Waktu</th><th>Site</th></tr></thead>

<script>
// ================= KONFIGURASI =================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymsNSRIXP_2QAaameNilabmnrK2yplDBoT58D6r0FhuN2z2smDJ3zfjAuaDG4g5N3J/exec";
const SYNC_INTERVAL_MS = 5000;

// ================= GLOBAL VARIABLES =================
let visitors = {};
let logs = [];
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let syncQueue = [];
let isProcessingQueue = false;
let syncLock = false;
let actionMutex = false;
let scannerInstance = null;
let isScanning = false;
let processingRegs = new Set();
let lastScanTime = {};
let scanCounter = 0;
const SCAN_COOLDOWN_MS = 3000;

let vmsSiteData = { names: { SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" } };

function toast(msg, type) {
    type = type || "info";
    var t = document.createElement("div");
    t.className = "toast-msg " + type;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}
window.toast = toast;

function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }

function lockUI(lock) {
    document.body.style.pointerEvents = lock ? "none" : "auto";
    document.body.style.opacity = lock ? "0.6" : "1";
}

function generateReg() {
    return "REG" + Date.now() + Math.floor(Math.random() * 10000);
}

function getSiteName(siteId) {
    var names = {};
    try { names = JSON.parse(localStorage.getItem("vms_site_names") || "{}"); } catch(e) {}
    var name = names[siteId];
    if (!name || name.trim() === "") {
        name = siteId.replace(/_/g, " ");
        names[siteId] = name;
        localStorage.setItem("vms_site_names", JSON.stringify(names));
    }
    return name;
}

// ================= STORAGE =================
function secureSave() {
    try {
        var keys = Object.keys(visitors);
        if (keys.length > 500) {
            keys.sort(function(a, b) { return (visitors[a].updatedAt || 0) - (visitors[b].updatedAt || 0); });
            keys.slice(0, keys.length - 500).forEach(function(k) { delete visitors[k]; });
        }
        if (logs.length > 500) logs = logs.slice(0, 400);
        localStorage.setItem("vms_visitors", JSON.stringify(visitors));
        localStorage.setItem("vms_logs", JSON.stringify(logs));
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
    } catch (e) {
        console.error("STORAGE ERROR:", e);
        if (e.name === 'QuotaExceededError') {
            logs = logs.slice(0, 50);
            localStorage.setItem("vms_logs", JSON.stringify(logs));
            toast("⚠️ Memori HP Penuh", "warning");
        }
    }
}

function secureLoad() {
    try {
        visitors = JSON.parse(localStorage.getItem("vms_visitors")) || {};
        logs = JSON.parse(localStorage.getItem("vms_logs")) || [];
        syncQueue = JSON.parse(localStorage.getItem("vms_sync_queue")) || [];
        console.log("✅ Loaded visitors:", Object.keys(visitors).length);
    } catch(e) { console.error("secureLoad error:", e); }
}

function addLocalLog(reg, action) {
    var v = visitors[reg];
    logs.unshift({
        reg: reg,
        nama: v && v.nama ? v.nama : reg,
        perusahaan: v && v.perusahaan ? v.perusahaan : "-",
        kategori: v && v.kategori ? v.kategori : "UMUM",
        type: action,
        timestamp: Date.now(),
        site_id: SITE_ID
    });
    if (logs.length > 500) logs = logs.slice(0, 400);
    secureSave();
}

// ================= API CALLS =================
async function apiCall(params) {
    if (!navigator.onLine) return { status: "offline" };
    try {
        var formBody = [];
        for (var key in params) {
            if (params.hasOwnProperty(key)) {
                formBody.push(encodeURIComponent(key) + "=" + encodeURIComponent(params[key]));
            }
        }
        var res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formBody.join("&")
        });
        if (!res.ok) throw new Error("Server Response Error");
        return await res.json();
    } catch (e) {
        console.warn("API Call Fail:", e.message);
        return { status: "error_network" };
    }
}

async function registerVisitor(reg, data) {
    return await apiCall({
        action: "register",
        reg: reg,
        nama: data.nama,
        perusahaan: data.perusahaan,
        tujuan: data.tujuan,
        pic: data.pic,
        dept: data.dept,
        startDate: data.startDate,
        expDate: data.expDate,
        kategori: data.kategori,
        site_id: SITE_ID,
        site_name: getSiteName(SITE_ID),
        photoBase64: data.foto || ""
    });
}

async function checkinVisitor(reg) {
    return await apiCall({ action: "checkin", reg: reg, site_id: SITE_ID });
}

async function checkoutVisitor(reg) {
    return await apiCall({ action: "checkout", reg: reg, site_id: SITE_ID });
}

// ================= SYNC =================
async function pullFromSheet() {
    if (syncLock || !navigator.onLine) return;
    syncLock = true;
    try {
        var res = await fetch(APPS_SCRIPT_URL + "?action=pull&site_id=" + encodeURIComponent(SITE_ID));
        var result = await res.json();
        
        if (result.status === "success" && result.data && result.data.length > 0) {
            var headers = result.data[0];
            var rows = result.data.slice(1);
            var updated = 0;
            
            for (var i = 0; i < rows.length; i++) {
                var row = rows[i];
                var reg = row[8];
                if (!reg) continue;
                
                // Foto: PRIORITAS BASE64 dari kolom 20, baru URL dari kolom 19
                var photoData = "";
                if (row[20] && row[20].startsWith("data:image")) {
                    photoData = row[20]; // BASE64
                } else if (row[19] && row[19].startsWith("https://")) {
                    photoData = row[19]; // URL Drive
                } else if (visitors[reg] && visitors[reg].foto) {
                    photoData = visitors[reg].foto;
                }
                
                visitors[reg] = {
                    nama: row[0] || (visitors[reg] ? visitors[reg].nama : "Unknown"),
                    perusahaan: row[1] || (visitors[reg] ? visitors[reg].perusahaan : "-"),
                    tujuan: row[2] || (visitors[reg] ? visitors[reg].tujuan : "-"),
                    pic: row[3] || (visitors[reg] ? visitors[reg].pic : "-"),
                    startDate: row[4] || (visitors[reg] ? visitors[reg].startDate : "-"),
                    expDate: row[5] || (visitors[reg] ? visitors[reg].expDate : "-"),
                    kategori: row[14] || (visitors[reg] ? visitors[reg].kategori : "UMUM"),
                    dept: row[15] || (visitors[reg] ? visitors[reg].dept : "-"),
                    currentStatus: row[11] || (visitors[reg] ? visitors[reg].currentStatus : "OUT"),
                    site: row[12] || (visitors[reg] ? visitors[reg].site : SITE_ID),
                    foto: photoData,
                    updatedAt: Date.now()
                };
                updated++;
            }
            
            if (updated > 0) {
                secureSave();
                renderDashboard();
                renderLogTable();
                console.log("✅ Sync: " + updated + " data diperbarui");
            }
        }
    } catch (e) {
        console.warn("Pull Sync Fail:", e.message);
    } finally {
        syncLock = false;
    }
}

// ================= RENDER =================
function renderDashboard() {
    try {
        var v = Object.values(visitors);
        var active = 0;
        for (var i = 0; i < v.length; i++) {
            if (v[i].currentStatus === "IN") active++;
        }
        var statsWidget = document.getElementById("statsWidget");
        if (statsWidget) {
            statsWidget.innerHTML = '<div class="stat-card"><h4>Total Visitors</h4><div class="stat-number">' + v.length + '</div></div>' +
                '<div class="stat-card"><h4>Active Inside</h4><div class="stat-number">' + active + '</div></div>';
        }
    } catch(e) { console.error("renderDashboard error:", e); }
}

function renderLogTable() {
    try {
        var search = document.getElementById("searchLog") ? document.getElementById("searchLog").value.toLowerCase() : "";
        var tbody = document.getElementById("logTableBody");
        if (!tbody) return;
        var filtered = [];
        for (var i = 0; i < logs.length; i++) {
            var l = logs[i];
            if (!l.nama) continue;
            var matchSearch = l.nama.toLowerCase().indexOf(search) !== -1 || (l.reg && l.reg.toLowerCase().indexOf(search) !== -1);
            if (matchSearch) filtered.push(l);
        }
        filtered.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
        tbody.innerHTML = "";
        var sliceLen = filtered.length > 100 ? 100 : filtered.length;
        for (var j = 0; j < sliceLen; j++) {
            var l = filtered[j];
            var row = tbody.insertRow();
            var v = visitors[l.reg] || {};
            row.insertCell(0).innerHTML = '<input type="checkbox" class="logCheckItem" data-reg="' + l.reg + '">';
            row.insertCell(1).innerText = l.reg;
            
            var photoCell = row.insertCell(2);
            var photoUrl = v.foto || "";
            if (photoUrl && photoUrl.length > 50) {
                if (photoUrl.startsWith("data:image")) {
                    photoCell.innerHTML = '<img src="' + photoUrl + '" style="width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #16a34a;">';
                } else if (photoUrl.startsWith("https://")) {
                    photoCell.innerHTML = '<img src="' + photoUrl + '" style="width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #16a34a;" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div style=\"width:40px;height:40px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:10px;\">📷</div>\';">';
                } else {
                    photoCell.innerHTML = '<div style="width:40px; height:40px; border-radius:8px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:10px; color:#ccc;">NO IMG</div>';
                }
            } else {
                photoCell.innerHTML = '<div style="width:40px; height:40px; border-radius:8px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:10px; color:#ccc;">NO IMG</div>';
            }
            
            row.insertCell(3).innerText = v.nama || l.nama || "-";
            row.insertCell(4).innerText = v.perusahaan || l.perusahaan || "-";
            row.insertCell(5).innerHTML = '<span class="badge badge-' + (v.kategori || 'umum').toLowerCase() + '">' + (v.kategori || 'Visitor') + '</span>';
            var currentStatus = v.currentStatus || "OUT";
            var statusText = currentStatus === "IN" ? "DI DALAM" : "SELESAI";
            var statusColor = currentStatus === "IN" ? "#16a34a" : "#dc2626";
            row.insertCell(6).innerHTML = '<span style="background:' + statusColor + '; color:white; padding:4px 10px; border-radius:999px; font-size:10px; font-weight:bold;">' + statusText + '</span>';
            var actionCell = row.insertCell(7);
            actionCell.innerHTML = '<button class="btn-outline" style="padding:4px 8px;" onclick="showPreview(\'' + l.reg + '\', visitors[\'' + l.reg + '\'])">🖨️ PDF</button>';
            var timeDisplay = l.timestamp ? new Date(l.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : "-";
            row.insertCell(8).innerText = timeDisplay;
            row.insertCell(9).innerText = l.site_id || "-";
        }
    } catch(e) { console.error("renderLogTable error:", e); }
}

// ================= PDF GENERATION (FOTO BASE64) =================
async function ensureJSPDF() {
    if (window.jspdf) return true;
    return new Promise(function(resolve) {
        var i = 0, iv = setInterval(function() {
            if (window.jspdf) { clearInterval(iv); resolve(true); }
            if (i++ > 100) { clearInterval(iv); resolve(false); }
        }, 100);
    });
}

async function downloadPDF(reg, data) {
    try {
        await ensureJSPDF();
        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a6" });
        
        // Ambil data dari visitors storage
        var visitorData = visitors[reg] || {};
        if (data) {
            for (var k in data) { if (!visitorData[k] || visitorData[k] === "-") visitorData[k] = data[k]; }
        }
        
        // CARI FOTO BASE64
        var fotoBase64 = null;
        if (visitorData.foto && visitorData.foto.startsWith("data:image")) {
            fotoBase64 = visitorData.foto;
            console.log("✅ Foto BASE64 ditemukan di visitorData.foto");
        } else if (data && data.foto && data.foto.startsWith("data:image")) {
            fotoBase64 = data.foto;
            console.log("✅ Foto BASE64 ditemukan di data.foto");
        }
        
        // Header
        doc.setFillColor(31, 78, 74);
        doc.rect(0, 0, 105, 25, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(14);
        doc.setFont(undefined, "bold");
        doc.text("VISITOR PASS", 52.5, 12, { align: "center" });
        doc.setFontSize(8);
        doc.text("SECURITY AUTHORIZED", 52.5, 18, { align: "center" });
        
        // Frame foto
        doc.setDrawColor(200, 200, 200);
        doc.rect(32.5, 30, 40, 50);
        
        // Tampilkan foto jika ada BASE64
        if (fotoBase64 && fotoBase64.length > 500) {
            try {
                doc.addImage(fotoBase64, "JPEG", 33, 30.5, 39, 49);
                console.log("✅ Foto BERHASIL ditambahkan ke PDF");
            } catch(e) { 
                console.error("Gagal addImage:", e);
                doc.setFontSize(6);
                doc.setTextColor(100, 100, 100);
                doc.text("Photo error", 52.5, 55, { align: "center" });
            }
        } else {
            doc.setFontSize(6);
            doc.setTextColor(100, 100, 100);
            doc.text("No Photo", 52.5, 55, { align: "center" });
            console.log("❌ Tidak ada foto BASE64 untuk REG:", reg);
        }
        
        // Nama dan Perusahaan
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.setFont(undefined, "bold");
        doc.text((visitorData.nama || "Unknown").toUpperCase(), 52.5, 90, { align: "center" });
        doc.setFontSize(9);
        doc.setFont(undefined, "normal");
        doc.text(visitorData.perusahaan || "-", 52.5, 96, { align: "center" });
        
        // Garis pembatas
        doc.setDrawColor(31, 78, 74);
        doc.setLineWidth(0.5);
        doc.line(15, 102, 90, 102);
        
        // Detail
        doc.setFontSize(8);
        var y = 108;
        doc.text("PIC      : " + (visitorData.pic || "-"), 15, y);
        doc.text("DATE     : " + (visitorData.startDate || "-"), 15, y + 5);
        doc.text("VALID TO : " + (visitorData.expDate || "-"), 15, y + 10);
        
        // QR Code
        try {
            var qrTemp = await QRCode.toDataURL(reg, { width: 100 });
            doc.addImage(qrTemp, "PNG", 70, 115, 25, 25);
        } catch(e) {}
        
        // REG
        doc.setFontSize(7);
        doc.setTextColor(150, 150, 150);
        doc.text(reg, 82.5, 142, { align: "center" });
        
        // Footer
        doc.setFontSize(6);
        doc.text("Property of Security Department", 52.5, 146, { align: "center" });
        
        doc.save("VISITOR_PASS_" + reg + ".pdf");
        toast("Badge Visitor berhasil di-download", "success");
        return true;
    } catch(err) {
        console.error("PDF Error:", err);
        toast("Gagal membuat Badge: " + err.message, "error");
        return false;
    }
}

async function generateQRandShow(reg, data) {
    try {
        var qrImage = await QRCode.toDataURL(reg, { width: 200 });
        showPreviewWithQR(reg, data, qrImage);
    } catch(e) {
        console.error("QR FAIL:", e);
        toast("Gagal generate QR", "error");
    }
}

function showPreviewWithQR(reg, data, qrImage) {
    if (!qrImage) { toast("QR gagal dibuat!", "error"); return; }
    var modal = document.createElement("div");
    modal.className = "modal-overlay";
    var fotoDisplay = (data && data.foto && data.foto.startsWith("data:image")) ? 
        '<img src="' + data.foto + '" style="width:70px; height:70px; border-radius:12px; object-fit:cover; border:2px solid #1f4e4a;">' : 
        '<div style="width:70px; height:70px; border-radius:12px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:10px; color:#ccc;">NO PHOTO</div>';
    modal.innerHTML = '<div class="modal-card">' +
        '<h3 style="text-align:center;">📄 Preview Invitation</h3>' +
        '<div style="display:flex; gap:15px; background:#f8fafc; padding:14px; border-radius:20px; margin-bottom:16px;">' + fotoDisplay +
        '<div><p><strong>Name</strong>: ' + (data?.nama || "-") + '</p><p><strong>Company</strong>: ' + (data?.perusahaan || "-") + '</p><p><strong>REG</strong>: ' + reg + '</p></div></div>' +
        '<div style="text-align:center;"><img src="' + qrImage + '" style="width:140px;"><p>' + reg + '</p></div>' +
        '<div class="flex-btns"><button id="previewDownloadBtn">Download PDF</button><button id="previewCloseBtn" class="btn-outline">Close</button></div></div>';
    document.body.appendChild(modal);
    setTimeout(function() { modal.classList.add("active"); }, 10);
    var downloadBtn = modal.querySelector("#previewDownloadBtn");
    var closeBtn = modal.querySelector("#previewCloseBtn");
    if (downloadBtn) {
        downloadBtn.onclick = async function() {
            data.qrImage = qrImage;
            await downloadPDF(reg, data);
            modal.remove();
        };
    }
    if (closeBtn) closeBtn.onclick = function() { modal.remove(); };
}

function showPreview(reg, data) { generateQRandShow(reg, data); }

// ================= CAMERA =================
async function getAvailableCameras() {
    try {
        var devices = await Html5Qrcode.getCameras();
        var select = document.getElementById("cameraSelection");
        if (devices && devices.length > 0) {
            select.innerHTML = "";
            for (var i = 0; i < devices.length; i++) {
                var device = devices[i];
                var option = document.createElement("option");
                option.value = device.id;
                var label = device.label.toLowerCase();
                if (label.includes("back") || label.includes("rear")) {
                    option.text = "📷 Kamera Belakang";
                    option.selected = true;
                } else {
                    option.text = "🤳 Kamera Depan";
                }
                select.appendChild(option);
            }
        }
    } catch(err) { console.error("Gagal cari kamera:", err); }
}

async function startScanner() {
    if (isScanning) return;
    var selectedCamId = document.getElementById("cameraSelection").value;
    if (!selectedCamId) { toast("Pilih kamera dulu!", "warning"); return; }
    if (!scannerInstance) scannerInstance = new Html5Qrcode("cameraPreview");
    try {
        await scannerInstance.start(selectedCamId, { fps: 10, qrbox: { width: 280, height: 280 } },
            async function(decodedText) { await processScan(decodedText); },
            function(error) {}
        );
        isScanning = true;
        toast("Scanner Aktif", "success");
    } catch(err) { toast("Gagal: " + err.message, "error"); isScanning = false; }
}

async function stopScanner() {
    if (scannerInstance && isScanning) {
        try { await scannerInstance.stop(); await scannerInstance.clear(); } catch(err) {}
    }
    isScanning = false;
}

async function processScan(qrText) {
    if (actionMutex) return false;
    actionMutex = true;
    var reg = qrText.trim();
    if (!reg.match(/^REG\d+/i)) { toast("QR tidak valid!", "error"); actionMutex = false; return false; }
    
    var mode = document.getElementById("scanMode").value;
    var visitor = visitors[reg];
    if (!visitor) { toast("Data tidak ditemukan, sync...", "info"); await pullFromSheet(); visitor = visitors[reg]; }
    if (!visitor) { toast("REG tidak terdaftar!", "error"); actionMutex = false; return false; }
    
    if (mode === "CHECK_IN") {
        var result = await checkinVisitor(reg);
        if (result.status === "success") {
            visitor.currentStatus = "IN";
            visitors[reg] = visitor;
            addLocalLog(reg, "CHECK_IN");
            vibrate();
            toast("✅ IN: " + visitor.nama, "success");
        }
    } else {
        var result2 = await checkoutVisitor(reg);
        if (result2.status === "success") {
            visitor.currentStatus = "OUT";
            visitors[reg] = visitor;
            addLocalLog(reg, "CHECK_OUT");
            vibrate();
            toast("✅ OUT: " + visitor.nama, "success");
        }
    }
    renderDashboard();
    renderLogTable();
    secureSave();
    actionMutex = false;
    return true;
}

// ================= SITE MANAGEMENT =================
function setSite(site) {
    SITE_ID = site;
    localStorage.setItem("vms_site", SITE_ID);
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(function(sel) { if (sel && sel.value !== site) sel.value = site; });
    vmsSite_applyToUI();
    toast("Site aktif: " + getSiteName(SITE_ID), "success");
    renderDashboard();
    renderLogTable();
}

function vmsSite_load() {
    try { var stored = localStorage.getItem("vms_site_names"); if (stored) { var parsed = JSON.parse(stored); for (var k in parsed) { vmsSiteData.names[k] = parsed[k]; } } } catch(e) {}
    vmsSite_applyToUI();
}
function vmsSite_applyToUI() {
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(function(sel) {
        if (!sel) return;
        Array.from(sel.options).forEach(function(opt) {
            if (vmsSiteData.names[opt.value]) {
                var icon = opt.textContent.substring(0, 2);
                var hasIcon = icon === "🏭" || icon === "🏢" || icon === "🏬";
                opt.textContent = (hasIcon ? icon + " " : "") + vmsSiteData.names[opt.value];
            }
        });
    });
}
function vmsSite_open() {
    var modal = document.getElementById("vmsSiteModal");
    if (modal) {
        modal.style.display = "flex";
        document.getElementById("vmsA").value = vmsSiteData.names.SITE_A || "SITE A";
        document.getElementById("vmsB").value = vmsSiteData.names.SITE_B || "SITE B";
        document.getElementById("vmsC").value = vmsSiteData.names.SITE_C || "SITE C";
    }
}
function vmsSite_close() { document.getElementById("vmsSiteModal").style.display = "none"; }
function vmsSite_submit() {
    vmsSiteData.names.SITE_A = document.getElementById("vmsA").value.trim() || "SITE A";
    vmsSiteData.names.SITE_B = document.getElementById("vmsB").value.trim() || "SITE B";
    vmsSiteData.names.SITE_C = document.getElementById("vmsC").value.trim() || "SITE C";
    vmsSite_save();
    vmsSite_applyToUI();
    toast("✅ Site names saved!", "success");
    vmsSite_close();
}
function vmsSite_save() { localStorage.setItem("vms_site_names", JSON.stringify(vmsSiteData.names)); return true; }

// ================= EVENT HANDLERS =================
document.getElementById("generateQRBtn").onclick = async function() {
    if (actionMutex) return;
    actionMutex = true;
    lockUI(true);
    try {
        var nama = document.getElementById("regName").value.trim();
        var perusahaan = document.getElementById("regCompany").value.trim();
        var kategori = document.getElementById("regCategory").value;
        var tujuan = document.getElementById("regPurpose").value;
        var pic = document.getElementById("regPic").value.trim();
        var dept = document.getElementById("regDept").value.trim();
        var startDate = document.getElementById("regStartDate").value || new Date().toISOString().slice(0, 10);
        var expDate = document.getElementById("regExpDate").value;
        
        if (!nama || !perusahaan || !pic || !dept || !expDate) { toast("Lengkapi semua field", "error"); return; }
        
        var reg = generateReg();
        if (visitors[reg]) { toast("REG sudah ada!", "warning"); return; }
        
        // Proses foto ke BASE64
        var fotoBase64 = "";
        var file = document.getElementById("regPhotoFile").files[0];
        if (file) {
            try {
                var reader = await new Promise(function(resolve) { var fr = new FileReader(); fr.onload = function() { resolve(fr.result); }; fr.readAsDataURL(file); });
                var img = new Image();
                img.src = reader;
                await new Promise(function(r) { img.onload = r; });
                var canvas = document.createElement("canvas");
                var maxWidth = 300;
                var scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
                fotoBase64 = canvas.toDataURL("image/jpeg", 0.7);
                console.log("✅ Foto BASE64 siap, length:", fotoBase64.length);
            } catch(e) { console.warn("Photo error:", e); }
        }
        
        var data = { nama: nama, perusahaan: perusahaan, kategori: kategori, tujuan: tujuan, pic: pic, dept: dept, startDate: startDate, expDate: expDate, foto: fotoBase64, sessions: [], currentStatus: "OUT", updatedAt: Date.now() };
        visitors[reg] = data;
        addLocalLog(reg, "REGISTER");
        secureSave();
        
        toast("📤 Mengirim data...", "info");
        var result = await registerVisitor(reg, data);
        
        if (result && result.status === "success") {
            toast("✅ " + nama + " terdaftar (" + reg + ")", "success");
        } else {
            console.log("Server response:", result);
            toast("⚠️ " + nama + " terdaftar OFFLINE", "warning");
        }
        
        vibrate();
        generateQRandShow(reg, data);
        
        document.getElementById("regName").value = "";
        document.getElementById("regCompany").value = "";
        document.getElementById("regPic").value = "";
        document.getElementById("regDept").value = "";
        document.getElementById("regPhotoFile").value = "";
        document.getElementById("previewPhotoThumb").src = "";
        
        renderDashboard();
        renderLogTable();
        await pullFromSheet();
    } catch(e) { console.error("Error:", e); toast("Terjadi kesalahan", "error"); }
    finally { actionMutex = false; lockUI(false); }
};

document.getElementById("walkinBtn").onclick = async function() {
    if (actionMutex) return;
    actionMutex = true;
    var reg = generateReg();
    var now = new Date();
    var exp = new Date(now);
    exp.setDate(exp.getDate() + 1);
    var walkData = { nama: "WALK-IN", perusahaan: "Guest", kategori: "UMUM", tujuan: "Visit", pic: "Reception", dept: "Umum", startDate: now.toISOString().slice(0, 10), expDate: exp.toISOString().slice(0, 10), foto: "", sessions: [], currentStatus: "OUT", updatedAt: Date.now() };
    visitors[reg] = walkData;
    addLocalLog(reg, "WALK-IN");
    secureSave();
    toast("✅ Walk-in " + reg, "success");
    generateQRandShow(reg, walkData);
    renderDashboard();
    renderLogTable();
    await pullFromSheet();
    actionMutex = false;
};

document.getElementById("startCamBtn").onclick = async function() { await stopScanner(); if (scannerInstance) { try { await scannerInstance.clear(); } catch(e) {} scannerInstance = null; } await startScanner(); };
document.getElementById("stopCamBtn").onclick = async function() { await stopScanner(); toast("Kamera berhenti", "info"); };
document.getElementById("uploadQrBtn").onclick = function() { document.getElementById("uploadQrFile").click(); };
document.getElementById("uploadQrFile").onchange = async function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.src = url;
    await img.decode();
    var canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;
    canvas.getContext("2d").drawImage(img, 0, 0);
    var scanner = new Html5Qrcode("temp-reader");
    var decoded = await scanner.scanImage(canvas);
    await processScan(decoded);
    await scanner.clear();
};

document.getElementById("manualProcess").onclick = async function() {
    var reg = document.getElementById("manualReg").value.trim();
    if (!reg) { toast("Masukkan REG", "warning"); return; }
    var mode = document.getElementById("scanMode").value;
    var visitor = visitors[reg];
    if (!visitor) { toast("REG tidak ditemukan!", "error"); return; }
    if (mode === "CHECK_IN") {
        await checkinVisitor(reg);
        visitor.currentStatus = "IN";
        addLocalLog(reg, "CHECK_IN");
        toast("Check-in " + visitor.nama, "success");
    } else {
        await checkoutVisitor(reg);
        visitor.currentStatus = "OUT";
        addLocalLog(reg, "CHECK_OUT");
        toast("Check-out " + visitor.nama, "success");
    }
    visitors[reg] = visitor;
    secureSave();
    renderDashboard();
    renderLogTable();
};

document.getElementById("refreshLogsBtn").onclick = function() { pullFromSheet(); renderLogTable(); };
document.getElementById("selectAllBtn").onclick = function() { document.querySelectorAll(".logCheckItem").forEach(function(c) { c.checked = true; }); };
document.getElementById("deselectAllBtn").onclick = function() { document.querySelectorAll(".logCheckItem").forEach(function(c) { c.checked = false; }); };
document.getElementById("deleteSelectedBtn").onclick = function() {
    var regs = [];
    document.querySelectorAll(".logCheckItem:checked").forEach(function(c) { regs.push(c.dataset.reg); });
    regs.forEach(function(r) { delete visitors[r]; });
    logs = logs.filter(function(l) { return regs.indexOf(l.reg) === -1; });
    secureSave();
    renderDashboard();
    renderLogTable();
    toast("Berhasil menghapus " + regs.length + " data", "success");
};
document.getElementById("deleteAllBtn").onclick = function() { visitors = {}; logs = []; secureSave(); renderDashboard(); renderLogTable(); toast("All data cleared", "info"); };
document.getElementById("backupAction").onclick = function() { var a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({ visitors: visitors, logs: logs })], { type: "application/json" })); a.download = "vms_backup_" + Date.now() + ".json"; a.click(); toast("Backup ready", "success"); };
document.getElementById("resetDatabaseAction").onclick = function() { visitors = {}; logs = []; secureSave(); renderDashboard(); renderLogTable(); toast("Database reset", "info"); };
document.getElementById("regPhotoFile").onchange = function(e) { if (e.target.files[0]) { var r = new FileReader(); r.onload = function(ev) { var preview = document.getElementById("previewPhotoThumb"); if (preview) preview.src = ev.target.result; }; r.readAsDataURL(e.target.files[0]); } };
document.getElementById("submitLicenseBtn").onclick = function() { 
    var input = document.getElementById("licenseInput"); 
    if (input && input.value) { localStorage.setItem("vms_license_key", input.value); toast("✅ License activated!", "success"); input.value = ""; }
    else { toast("Masukkan license key", "warning"); }
};
document.getElementById("siteSelector").onchange = function(e) { setSite(e.target.value); };
document.getElementById("siteSelectorTop").onchange = function(e) { setSite(e.target.value); };

function exportToExcel() {
    if (!window.XLSX) { toast("Excel engine belum siap", "error"); return; }
    var dataForExcel = [];
    Object.entries(visitors).forEach(function(entry) {
        var reg = entry[0];
        var visitor = entry[1];
        dataForExcel.push({ "Nama": visitor.nama || "-", "Perusahaan": visitor.perusahaan || "-", "Kategori": visitor.kategori || "-", "PIC": visitor.pic || "-", "REG": reg });
    });
    if (dataForExcel.length === 0) { toast("Tidak ada data", "warning"); return; }
    var ws = XLSX.utils.json_to_sheet(dataForExcel);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
    XLSX.writeFile(wb, "VMS_Report_" + Date.now() + ".xlsx");
    toast("✅ Export Excel berhasil", "success");
}
document.getElementById("exportExcelAction").onclick = exportToExcel;

function switchTab(tabId) {
    document.getElementById("dashboardPane").classList.remove("active-pane");
    document.getElementById("registerPane").classList.remove("active-pane");
    document.getElementById("scannerPane").classList.remove("active-pane");
    document.getElementById("logsPane").classList.remove("active-pane");
    document.getElementById(tabId + "Pane").classList.add("active-pane");
    document.querySelectorAll(".nav-item").forEach(function(nav) { nav.classList.remove("active"); });
    document.querySelector('.nav-item[data-tab="' + tabId + '"]').classList.add("active");
}
document.querySelectorAll(".nav-item").forEach(function(el) { el.addEventListener("click", function() { switchTab(this.dataset.tab); if (window.innerWidth <= 780) { document.getElementById("mobileSidebar").classList.remove("open"); } }); });
document.querySelectorAll(".mobile-nav").forEach(function(el) { el.addEventListener("click", function() { switchTab(this.dataset.tab); document.getElementById("mobileSidebar").classList.remove("open"); }); });
document.getElementById("mobileMenuBtn").onclick = function() { document.getElementById("mobileSidebar").classList.add("open"); };
document.getElementById("overlay").onclick = function() { document.getElementById("mobileSidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };

// ================= INIT =================
async function init() {
    secureLoad();
    vmsSite_load();
    setSite(SITE_ID);
    renderDashboard();
    renderLogTable();
    getAvailableCameras();
    if (navigator.onLine) await pullFromSheet();
    setInterval(function() { if (navigator.onLine) pullFromSheet(); }, SYNC_INTERVAL_MS);
}
init();
