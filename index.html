<script>
// ================= FAILSAFE CORE =================
window.VMS_SAFE = true;

window.addEventListener("error", function(e){
    console.error("GLOBAL ERROR:", e.message);
    if(window.toast) toast("⚠️ System error terdeteksi", "error");
});

window.addEventListener("unhandledrejection", function(e){
    console.error("PROMISE ERROR:", e.reason);
    if(window.toast) toast("⚠️ Network/async error", "warning");
});

// ================= SECURITY & HARDENING =================
const SECRET = "OMNIGUARD_SECRET_2026";
const SCAN_COOLDOWN_MS = 3000;
const SCAN_MAX_PER_MIN = 20;
let scanCounter = 0;
let syncLock = false;
let globalScanLock = false;

setInterval(() => scanCounter = 0, 60000);

function lockUI(lock=true){
    document.body.style.pointerEvents = lock ? "none" : "auto";
    document.body.style.opacity = lock ? "0.6" : "1";
}

function vibrate(){
    if (navigator.vibrate) navigator.vibrate(100);
}

async function sha256(str){
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,'0'))
    .join('');
}

// ================= INIT =================
(function initSiteNameDefault() {  
    let saved = localStorage.getItem("vms_site_names");  
    if (!saved) {  
        localStorage.setItem("vms_site_names", JSON.stringify({ SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" }));  
    }  
})();  

var vmsSiteData = {
  names: { SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" }
};

// ⚠️ GANTI URL INI DENGAN URL DEPLOYMENT APPS SCRIPT ANDA ⚠️
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfyJdAl6aLC35vLN1ES9QA19Kx8rlVXx0Yc9pBNFLKkixEmYF4gSVO50yhoZkdTvPeMw/exec";  
const SYNC_INTERVAL_MS = 10000;  

let visitors = {};  
let logs = [];  
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";  
let isProcessingQueue = false;  
let syncQueue = [];  
let lastScanTime = {};  
let processingRegs = new Set();  
let scannerInstance = null;  
let isScanning = false;  
let currentCameraId = null;  
let cameraResetInterval = null;  
let actionMutex = false;  
let localStorageVersion = parseInt(localStorage.getItem("vms_version") || "0");  

function incrementVersion() {
    localStorageVersion++;
    localStorage.setItem("vms_version", localStorageVersion);
}

function getSiteName(siteId) {  
    let names = {};  
    try { names = JSON.parse(localStorage.getItem("vms_site_names") || "{}"); } catch(e) { console.error("getSiteName parse error:", e); }  
    let name = names[siteId];  
    if (!name || name.trim() === "" || name === "undefined") {  
        name = siteId.replace(/_/g, " ");  
        names[siteId] = name;  
        localStorage.setItem("vms_site_names", JSON.stringify(names));  
    }  
    return name;  
}  

function toast(msg, type = "info") {  
    let t = document.createElement("div");  
    t.className = `toast-msg ${type}`;  
    t.innerText = msg;  
    document.body.appendChild(t);  
    setTimeout(() => t.remove(), 3000);  
}  
window.toast = toast;  

function generateReg() {  
    let reg; let attempts = 0;  
    do {  
        reg = "REG" + Date.now() + Math.floor(Math.random() * 10000);  
        attempts++;  
        if (attempts > 10) break;  
    } while (visitors[SITE_ID + "_" + reg]);  
    return reg;  
}  

// ================= HARDENED STORAGE =================
function secureSave() {
    try {
        if (Object.keys(visitors).length > 1500) {
            visitors = Object.fromEntries(Object.entries(visitors).slice(-1200));
        }
        if (logs.length > 1500) {
            logs = logs.slice(0, 1200);
        }
        
        let cleanVisitors = {};
        for (let k in visitors) {
            let v = { ...visitors[k] };
            delete v.foto;
            cleanVisitors[k] = v;
        }
        
        localStorage.setItem("vms_visitors", JSON.stringify(cleanVisitors));
        localStorage.setItem("vms_logs", JSON.stringify(logs));
        incrementVersion();
    } catch (e) {
        console.error("STORAGE ERROR:", e);
        toast("⚠️ Storage penuh, data dibersihkan", "warning");
        localStorage.clear();
    }
}

function secureLoad() {  
    try {
        visitors = JSON.parse(localStorage.getItem("vms_visitors")) || {};
        logs = JSON.parse(localStorage.getItem("vms_logs")) || [];
        if (logs.length > 2000) logs = logs.slice(0, 1500);
        window.visitors = visitors;
        window.logs = logs;
    } catch(e) {
        visitors = {};
        logs = [];
        toast("⚠️ Data corrupt, reset", "warning");
        console.error("secureLoad error:", e);
    }
}  

function cleanMemory(){
    if (logs.length > 1000) logs = logs.slice(0, 800);
    if (Object.keys(visitors).length > 1000){
        visitors = Object.fromEntries(Object.entries(visitors).slice(-800));
    }
    secureSave();
}
setInterval(cleanMemory, 60000);

function addLocalLog(reg, action) {  
    let siteKey = SITE_ID + "_" + reg;  
    let v = visitors[siteKey];  
    let name = v?.nama || reg;  
    let company = v?.perusahaan || "";  
    let category = v?.kategori || "UMUM";  
    logs.unshift({ reg, name, company, category, action, time: Date.now(), site: SITE_ID, site_name: getSiteName(SITE_ID) });  
    if (logs.length > 2000) logs = logs.slice(0, 1500);  
    secureSave();  
}  

// ================= API CALL (HARDENED) =================
async function apiCall(params) {
    if (!navigator.onLine) return { status: "offline" };
    if (document.hidden) return { status: "background" };
    
    try {
        const timestamp = Date.now().toString();
        const base = String(params.reg || "") + String(params.action) + String(timestamp) + String(SECRET);
        const sign = await sha256(base);
        const formData = new URLSearchParams({
            ...params,
            timestamp,
            sign,
            ua: navigator.userAgent
        });

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);

        const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: formData,
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (!res.ok) return { status: "error_network" };

        let data;
        try {
            data = await res.json();
        } catch {
            return { status: "error_parse" };
        }

        return data;
    } catch (e) {
        return { status: "error" };
    }
}

async function registerVisitor(reg, data) {  
    return await apiCall({ action: "register", reg, name: data.nama, company: data.perusahaan, purpose: data.tujuan, pic: data.pic, dept: data.dept, start: data.startDate, exp: data.expDate, category: data.kategori, site_id: SITE_ID, site_name: (getSiteName(SITE_ID) || SITE_ID.replace(/_/g," ")).trim(), photo: data.foto || "" });  
}  

async function walkinVisitor(reg, data) {  
    return await apiCall({ action: "walkin", reg, name: data.nama, company: data.perusahaan, purpose: data.tujuan, pic: data.pic, dept: data.dept, start: data.startDate, exp: data.expDate, category: data.kategori, site_id: SITE_ID, site_name: (getSiteName(SITE_ID) || SITE_ID.replace(/_/g," ")).trim(), photo: data.foto || "" });  
}  

async function checkinVisitor(reg) { return await apiCall({ action: "checkin", reg, site_id: SITE_ID }); }  
async function checkoutVisitor(reg) { return await apiCall({ action: "checkout", reg, site_id: SITE_ID }); }  
async function generateQRCode(reg) { return await apiCall({ action: "generateqr", reg }); }  
async function validateQRCode(qrData) { return await apiCall({ action: "validateqr", qrData }); }  

async function pullFromSheet() {
  if (syncLock) return;
  if (document.hidden) return;

  syncLock = true;

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "pull",
        site_id: SITE_ID,
        t: Date.now()
      })
    });

    if (!response.ok) throw new Error("Network error");

    const result = await response.json();

    if (result.status === "success" && result.data) {
      syncVisitorStatus(result.data);
    }

  } catch (err) {
    console.error("Pull error:", err);
  } finally {
    syncLock = false;
  }
}

function syncVisitorStatus(sheetData) {  
    if (!Array.isArray(sheetData)) return;  
    for (let i = 1; i < sheetData.length; i++) {  
        const row = sheetData[i];  
        const reg = row[1];
        const siteId = row[13];
        const status = row[10];
        const checkin = row[11];
        const checkout = row[12];
        if (!reg || siteId !== SITE_ID) continue;  
        const key = SITE_ID + "_" + reg;  
        let rawTime = checkout || checkin || row[0];  
        let sheetTime = rawTime ? new Date(rawTime).getTime() : 0;  
        if (isNaN(sheetTime)) sheetTime = 0;  
        if (!visitors[key]) {  
            visitors[key] = {  
                nama: row[2] || "Unknown",  
                perusahaan: row[3] || "",  
                kategori: row[9] || "UMUM",  
                tujuan: row[4] || "-",  
                pic: row[5] || "-",  
                dept: row[6] || "-",  
                startDate: row[7] || "",  
                expDate: row[8] || "",  
                foto: "",  
                sessions: [],  
                currentStatus: status === "IN" ? "IN" : "OUT",  
                updatedAt: sheetTime  
            };  
        } else {  
            const localTime = visitors[key].updatedAt || 0;  
            if (sheetTime >= localTime || !localTime) {  
                visitors[key].currentStatus = status === "IN" ? "IN" : "OUT";  
                visitors[key].updatedAt = sheetTime;  
            }  
        }  
    }  
    secureSave();  
    renderDashboard();  
    renderLogTable();  
}

function updateQueueStatus() {  
    let div = document.getElementById("queueStatusIndicator");  
    if (!div) { div = document.createElement("div"); div.id = "queueStatusIndicator"; div.className = "queue-status"; document.body.appendChild(div); }  
    div.innerHTML = syncQueue.length ? `📦 Queue: ${syncQueue.length}` : `✅ Elite Sync`;  
}  

function persistQueue() {  
    try { localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue)); updateQueueStatus(); } catch (e) { console.error("persistQueue error:", e); }  
}  

function addToQueue(action, reg, data = null) {  
    syncQueue = syncQueue.filter(q => !(q.reg === reg && q.action === action));
    syncQueue.push({ id: Date.now() + "_" + reg, action, reg, data, retryCount: 0, timestamp: Date.now(), fingerprint: action + "_" + reg });  
    persistQueue();  
    if (navigator.onLine) processQueue();  
}  

async function processQueue() {  
    if (isProcessingQueue || syncQueue.length === 0) return;  
    isProcessingQueue = true;  
    const newQueue = [];  
    for (const item of syncQueue) {  
        let result;  
        try {  
            if (item.action === "checkin") result = await checkinVisitor(item.reg);  
            else if (item.action === "checkout") result = await checkoutVisitor(item.reg);  
            else if (item.action === "register") result = await registerVisitor(item.reg, item.data);  
            else if (item.action === "walkin") result = await walkinVisitor(item.reg, item.data);  
        } catch (e) { result = { status: "error" }; }  
        if (result?.status === "duplicate") { toast("REG sudah terdaftar!", "warning"); continue; }  
        if (result?.status !== "success") {  
            item.retryCount = (item.retryCount || 0) + 1;  
            let delay = Math.min(Math.pow(2, item.retryCount) * 1000, 10000);  
            if (item.retryCount <= 5) { await new Promise(r => setTimeout(r, delay)); newQueue.push(item); }  
            else console.warn("DROP QUEUE:", item);  
        }  
    }  
    syncQueue = newQueue;  
    persistQueue();  
    isProcessingQueue = false;  
}

// ================= QR SCAN PROCESS (FIXED) =================
async function processScan(qrText) {  
    if (actionMutex) return false;
    if (globalScanLock) return false;
    if (!qrText || typeof qrText !== "string") return false;
    
    if (scanCounter > SCAN_MAX_PER_MIN) {
        toast("⚠️ Scanner overload, tunggu sebentar", "warning");
        return false;
    }
    scanCounter++;
    
    globalScanLock = true;
    qrText = qrText.trim();  
    const mode = document.getElementById("scanMode").value;  
    
    // QR bisa berupa REG langsung atau format dengan prefix
    let reg = null;
    
    // Cek apakah QR berisi format REGxxxxx
    if (qrText.match(/^REG\d+/i)) {
        reg = qrText;
    } 
    // Cek apakah QR berisi format REGxxxxx|VMS2026
    else if (qrText.includes("|")) {
        const parts = qrText.split("|");
        if (parts[0].match(/^REG\d+/i)) {
            reg = parts[0];
        }
    }
    // Coba validasi via backend
    else {
        let validation = await validateQRCode(qrText);
        if (validation.status === "success" && validation.data && validation.data.reg) {
            reg = validation.data.reg;
        }
    }
    
    if (!reg) {
        toast("QR tidak valid! Format harus REGxxxxx", "error");
        globalScanLock = false;
        return false;
    }
    
    const nowTime = Date.now();  
    if (lastScanTime[reg] && nowTime - lastScanTime[reg] < SCAN_COOLDOWN_MS) { 
        toast("Scan terlalu cepat", "warning"); 
        globalScanLock = false; 
        return false;
    }  
    lastScanTime[reg] = nowTime;  
    
    if (processingRegs.has(reg)) { 
        toast("Sedang diproses", "warning"); 
        globalScanLock = false; 
        return false;
    }  
    processingRegs.add(reg);  
    actionMutex = true;  
    
    try {  
        let siteKey = SITE_ID + "_" + reg;  
        let visitor = visitors[siteKey];  
        if (!visitor) {  
            visitor = { 
                nama: "Unknown", 
                perusahaan: "", 
                kategori: "UMUM", 
                tujuan: "-", 
                pic: "-", 
                dept: "-", 
                startDate: "", 
                expDate: "", 
                foto: "", 
                sessions: [], 
                currentStatus: "OUT", 
                updatedAt: Date.now() 
            };  
            visitors[siteKey] = visitor;  
        }  
        
        let today = new Date();  
        let expDate = visitor.expDate ? new Date(visitor.expDate) : null;
        if (expDate && !isNaN(expDate.getTime())) {
            expDate.setHours(23, 59, 59, 999);
            if (expDate < today) { 
                toast("Visitor sudah expired!", "error"); 
                return false;
            }
        }
        
        if (mode === "CHECK_IN") {
            let hasOpen = visitor.sessions?.some(s => !s.checkOut);
            if (hasOpen) {
                toast("Sudah dalam keadaan CHECK-IN!", "warning");
                return false;
            }
            let result = await checkinVisitor(reg);
            if (result.status === "success") {
                if (!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: Date.now(), checkOut: null });
                visitor.currentStatus = "IN";
                visitor.updatedAt = Date.now();
                visitors[siteKey] = visitor;
                addLocalLog(reg, "CHECK_IN");
                vibrate();
                toast(`✅ CHECK-IN ${visitor.nama} berhasil`, "success");
            } else if (result.status === "already_in") {
                toast("Sudah CHECK-IN!", "warning");
            } else {
                addToQueue("checkin", reg);
                toast("⏳ Masuk queue (offline/gagal)", "warning");
            }
        } else {
            let result = await checkoutVisitor(reg);
            if (result.status === "success") {
                let openSession = visitor.sessions?.find(s => !s.checkOut);
                if (openSession) openSession.checkOut = Date.now();
                visitor.currentStatus = "OUT";
                visitor.updatedAt = Date.now();
                visitors[siteKey] = visitor;
                addLocalLog(reg, "CHECK_OUT");
                vibrate();
                toast(`✅ CHECK-OUT ${visitor.nama} berhasil`, "success");
            } else if (result.status === "not_checked_in") {
                toast("Belum CHECK-IN!", "warning");
            } else {
                addToQueue("checkout", reg);
                toast("⏳ Masuk queue", "warning");
            }
        }
        renderDashboard();  
        renderLogTable();  
        secureSave();  
        await pullFromSheet();  
        return true;  
    } catch (e) {  
        console.error("processScan error:", e);  
        toast("Error proses scan", "error");
        return false;  
    } finally {  
        actionMutex = false;  
        globalScanLock = false;
        setTimeout(() => processingRegs.delete(reg), 1000);  
    }  
}

        doc.setFillColor(31, 78, 74);  
        doc.rect(0, 0, 210, 40, "F");  
        doc.setTextColor(255, 255, 255);  
        doc.setFontSize(22);  
        doc.text("INVITATION LETTER", 105, 20, { align: "center" });  
        doc.setTextColor(0, 0, 0);  
        doc.setFontSize(12);  
        doc.setFont(undefined, "bold");  
        doc.text("VISITOR INFORMATION", 20, 60);  
        let y = 75;  
        doc.setFontSize(10);  
        doc.setFont(undefined, "normal");  
        doc.text(`Name : ${data.nama || "-"}`, 20, y); y += 8;  
        doc.text(`Company : ${data.perusahaan || "-"}`, 20, y); y += 8;  
        doc.text(`Purpose : ${data.tujuan || "-"}`, 20, y); y += 8;  
        doc.text(`PIC : ${data.pic || "-"}`, 20, y); y += 8;  
        doc.text(`Department : ${data.dept || "-"}`, 20, y); y += 8;  
        doc.text(`REG Number : ${reg}`, 20, y); y += 8;  
        doc.text(`Start Date : ${data.startDate || "-"}`, 20, y); y += 8;  
        doc.text(`Expired Date : ${data.expDate || "-"}`, 20, y); y += 8;  
        doc.text(`Status : ${data.currentStatus === "IN" ? "IN (Inside Area)" : "OUT"}`, 20, y);  
        if (data.qrImage && data.qrImage.startsWith("data:image")) { try { doc.addImage(data.qrImage, "PNG", 140, 60, 40, 40); } catch (e) { console.error("QR image PDF error:", e); } }  
        if (data.foto && data.foto.startsWith("data:image")) { try { let fotoLower = data.foto.toLowerCase(); let format = fotoLower.includes("png") ? "PNG" : "JPEG"; doc.addImage(data.foto, format, 140, 130, 40, 40); } catch (e) { console.error("Photo PDF error:", e); } }  
        let blob = doc.output("blob");  
        let url = URL.createObjectURL(blob);  
        let a = document.createElement("a");  
        a.href = url;  
        a.download = `INVITATION_${reg}.pdf`;  
        document.body.appendChild(a);  
        a.click();  
        document.body.removeChild(a);  
        setTimeout(() => URL.revokeObjectURL(url), 3000);  
        toast(`PDF ${reg} berhasil di download`, "success");  
        return true;  
    } catch (err) {  
        console.error("PDF Error:", err);  
        toast("Error saat generate PDF", "error");  
        return false;  
    }  
}  

async function ensureJSPDF() {  
    if (window.jspdf) return true;  
    return new Promise(resolve => {  
        let i = 0, iv = setInterval(() => {  
            if (window.jspdf) { clearInterval(iv); resolve(true); }  
            if (i++ > 100) { clearInterval(iv); resolve(false); }  
        }, 100);  
    });  
}

async function initScanner() {  
    if (scannerInstance) {  
        try { await scannerInstance.stop(); } catch(e) { console.error("stop error:", e); }  
        try { await scannerInstance.clear(); } catch(e) { console.error("clear error:", e); }  
        scannerInstance = null;  
    }  
    try {  
        let cameras = await Html5Qrcode.getCameras();  
        if (!cameras || cameras.length === 0) { toast("Tidak ada kamera terdeteksi", "error"); return false; }  
        currentCameraId = cameras[0].id;  
        scannerInstance = new Html5Qrcode("cameraPreview");  
        return true;  
    } catch (err) { toast("Gagal inisialisasi kamera: " + err.message, "error"); console.error("initScanner error:", err); return false; }  
}  

async function startScanner() {  
    if (isScanning) return;  
    if (!scannerInstance) { let init = await initScanner(); if (!init) return; }  
    try {  
        await scannerInstance.start(currentCameraId, { 
            fps: 10, 
            qrbox: { width: 280, height: 280 }, 
            aspectRatio: 1.0 
        },  
            async (decodedText) => { 
                console.log("QR Scanned:", decodedText);
                if (!processingRegs.has(decodedText)) await processScan(decodedText); 
            },  
            (error) => { 
                if (error && !error.includes("No MultiFormat Readers") && !error.includes("No barcode")) {
                    console.log("Scan error:", error); 
                }
            }  
        );  
        isScanning = true;  
        toast("Scanner siap, arahkan ke QR Code", "success");  
        if (cameraResetInterval) clearInterval(cameraResetInterval);  
        cameraResetInterval = setInterval(async () => { 
            if (!isScanning) return;
            try {
                await stopScanner();
                await startScanner();
            } catch(e){
                console.warn("Camera reset fail", e);
            }
        }, 180000);
    } catch (err) { 
        toast("Gagal start kamera: " + err.message, "error"); 
        console.error("startScanner error:", err); 
        isScanning = false; 
    }  
}  

async function stopScanner() {  
    if (cameraResetInterval) { clearInterval(cameraResetInterval); cameraResetInterval = null; }  
    if (scannerInstance && isScanning) { 
        try { 
            await scannerInstance.stop(); 
            await scannerInstance.clear(); 
        } catch (err) { 
            console.error("stopScanner error:", err); 
        } 
    }  
    isScanning = false;  
}

    if (scannerInstance) { 
        try { await scannerInstance.clear(); } catch(e) { console.error("clear error:", e); } 
        scannerInstance = null; 
    } 
    await startScanner(); 
};  

document.getElementById("stopCamBtn").onclick = async () => { 
    await stopScanner(); 
    if (scannerInstance) { 
        try { await scannerInstance.clear(); } catch(e) { console.error("clear error:", e); } 
        scannerInstance = null; 
    } 
    toast("Kamera berhenti", "info"); 
};  

document.getElementById("uploadQrBtn").onclick = () => document.getElementById("uploadQrFile")?.click();  
document.getElementById("uploadQrFile").onchange = async (e) => {  
    if (actionMutex) return;  
    actionMutex = true;  
    lockUI(true);
    try {  
        let file = e.target.files[0];  
        if (!file) return;  
        try {  
            let url = URL.createObjectURL(file);  
            let img = new Image();  
            img.src = url;  
            await img.decode();  
            URL.revokeObjectURL(url);  
            let canvas = document.createElement("canvas");  
            canvas.width = img.width;  
            canvas.height = img.height;  
            canvas.getContext("2d").drawImage(img, 0, 0);  
            let scanner = new Html5Qrcode("temp-reader");  
            let decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });  
            await processScan(decoded);  
            await scanner.clear();  
            document.getElementById("temp-reader").innerHTML = "";  
        } catch (err) { toast("QR tidak terbaca", "error"); console.error("upload QR error:", err); }  
    } catch (e) {  
        console.error("uploadQrFile error:", e);  
    } finally {  
        actionMutex = false;  
        lockUI(false);
    }  
};  

document.getElementById("manualProcess").onclick = async () => {  
    if (actionMutex) return;  
    actionMutex = true;  
    lockUI(true);
    try {  
        let reg = document.getElementById("manualReg").value.trim();  
        const mode = document.getElementById("scanMode").value;  
        
        if (!reg || !reg.match(/^REG\d+/i)) {
            toast("Format REG salah (contoh: REG20260504001)", "error");
            return;
        }
        
        let siteKey = SITE_ID + "_" + reg;  
        let visitor = visitors[siteKey];  
        if (!visitor) { 
            toast("REG tidak ditemukan", "error"); 
            return; 
        }  
        
        let expDate = visitor.expDate ? new Date(visitor.expDate) : null;
        if (expDate && !isNaN(expDate.getTime())) {
            expDate.setHours(23, 59, 59, 999);
            if (expDate < new Date()) {
                toast("QR sudah expired", "error");
                return;
            }
        }
        
        if (mode === "CHECK_IN") {
            let hasOpen = visitor.sessions?.some(s => !s.checkOut);
            if (hasOpen) {
                toast("Sudah check-in!", "warning");
                return;
            }
            let result = await checkinVisitor(reg);
            if (result.status === "success") {
                if (!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: Date.now(), checkOut: null });
                visitor.currentStatus = "IN";
                visitor.updatedAt = Date.now();
                visitors[siteKey] = visitor;
                addLocalLog(reg, "CHECK_IN");
                vibrate();
                toast(`Check-in ${visitor.nama} success`, "success");
            } else if (result.status === "already_in") {
                toast("Sudah check-in!", "warning");
            } else {
                addToQueue("checkin", reg);
                toast("Masuk queue", "warning");
            }
        } else {
            let openSession = visitor.sessions?.find(s => !s.checkOut);
            if (!openSession) {
                toast("Tidak ada sesi aktif", "warning");
                return;
            }
            let result = await checkoutVisitor(reg);
            if (result.status === "success") {
                openSession.checkOut = Date.now();
                visitor.currentStatus = "OUT";
                visitor.updatedAt = Date.now();
                visitors[siteKey] = visitor;
                addLocalLog(reg, "CHECK_OUT");
                vibrate();
                toast(`Check-out ${visitor.nama} success`, "success");
            } else if (result.status === "not_checked_in") {
                toast("Belum check-in!", "warning");
            } else {
                addToQueue("checkout", reg);
                toast("Masuk queue", "warning");
            }
        }
        renderDashboard();  
        renderLogTable();  
        secureSave();  
        await pullFromSheet();  
    } catch (e) {  
        console.error("manualProcess error:", e);  
        toast("Terjadi kesalahan", "error");  
    } finally {  
        actionMutex = false;  
        lockUI(false);
    }  
};  

document.getElementById("refreshLogsBtn").onclick = () => { pullFromSheet(); renderLogTable(); };  
document.getElementById("selectAllBtn").onclick = () => document.querySelectorAll(".logCheckItem").forEach(c => c.checked = true);  
document.getElementById("deselectAllBtn").onclick = () => document.querySelectorAll(".logCheckItem").forEach(c => c.checked = false);  
document.getElementById("deleteSelectedBtn").onclick = () => {  
    let regs = [...new Set([...document.querySelectorAll(".logCheckItem:checked")].map(c => c.dataset.reg))];  
    regs.forEach(r => delete visitors[SITE_ID + "_" + r]);  
    logs = logs.filter(l => !regs.includes(l.reg));  
    secureSave();  
    renderDashboard();  
    renderLogTable();  
    toast(`Deleted ${regs.length} records`, "success");  
};  
document.getElementById("deleteAllBtn").onclick = () => { visitors = {}; logs = []; secureSave(); renderDashboard(); renderLogTable(); toast("All data cleared", "info"); };  
document.getElementById("backupAction").onclick = () => { try { let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({ visitors, logs })], { type: "application/json" })); a.download = `vms_backup_${Date.now()}.json`; a.click(); toast("Backup ready", "success"); } catch (e) { toast("Backup gagal", "error"); console.error("backup error:", e); } };  
document.getElementById("resetDatabaseAction").onclick = () => { visitors = {}; logs = []; secureSave(); renderDashboard(); renderLogTable(); toast("Database reset", "info"); };  
document.getElementById("regPhotoFile").onchange = (e) => { if (e.target.files[0]) { let r = new FileReader(); r.onload = ev => { let preview = document.getElementById("previewPhotoThumb"); if (preview) preview.src = ev.target.result; }; r.readAsDataURL(e.target.files[0]); } };  
document.getElementById("submitLicenseBtn").onclick = () => { let input = document.getElementById("licenseInput"); if (input && input.value) toast("✅ License activated", "success"); if (input) input.value = ""; };  
document.getElementById("siteSelector").onchange = (e) => setSite(e.target.value);  
document.getElementById("siteSelectorTop").onchange = (e) => setSite(e.target.value);  

function exportToExcel() {  
    try {  
        if (!window.XLSX) { toast("Excel engine belum siap", "error"); return; }  
        let dataForExcel = [];  
        Object.entries(visitors).forEach(([siteKey, visitor]) => {  
            if (!siteKey.startsWith(SITE_ID + "_")) return;  
            let reg = siteKey.replace(SITE_ID + "_", "");  
            let jamMasuk = "-", jamKeluar = "-", durasi = "-", keterangan = "";  
            if (visitor.sessions && visitor.sessions.length > 0) {  
                let last = visitor.sessions[visitor.sessions.length - 1];  
                if (last.checkIn) jamMasuk = new Date(last.checkIn).toLocaleString("id-ID");  
                if (last.checkOut) jamKeluar = new Date(last.checkOut).toLocaleString("id-ID");  
                if (last.checkIn && last.checkOut) durasi = Math.floor((last.checkOut - last.checkIn) / 60000) + " menit";  
                keterangan = visitor.currentStatus === "IN" ? "Sedang di dalam" : (last.checkOut ? "Sudah check-out" : "Belum check-in");  
            } else keterangan = "Belum pernah check-in";  
            if (visitor.expDate && new Date(visitor.expDate) < new Date()) keterangan = "❌ EXPIRED - " + keterangan;  
            dataForExcel.push({ "Nama": visitor.nama || "-", "Perusahaan": visitor.perusahaan || "-", "Tujuan": visitor.tujuan || "-", "PIC": visitor.pic || "-", "Start Date": visitor.startDate || "-", "Expired Date": visitor.expDate || "-", "Jam Masuk": jamMasuk, "Jam Keluar": jamKeluar, "Durasi": durasi, "Nomor Registrasi": reg, "Keterangan": keterangan });  
        });  
        if (dataForExcel.length === 0) { toast("Tidak ada data", "warning"); return; }  
        let ws = XLSX.utils.json_to_sheet(dataForExcel);  
        let wb = XLSX.utils.book_new();  
        XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");  
        XLSX.writeFile(wb, `VMS_Report_${new Date().toISOString().slice(0, 19).replace(/:/g, "-")}.xlsx`);  
        toast("✅ Export Excel berhasil", "success");  
    } catch (err) { toast("Export gagal", "error"); console.error("export error:", err); }  
}  
document.getElementById("exportExcelAction").onclick = exportToExcel;  

let panes = { dashboard: document.getElementById("dashboardPane"), register: document.getElementById("registerPane"), scanner: document.getElementById("scannerPane"), logs: document.getElementById("logsPane") };  
function switchTab(tabId) {  
    Object.values(panes).forEach(p => p?.classList.remove("active-pane"));  
    if (panes[tabId]) panes[tabId].classList.add("active-pane");  
    document.querySelectorAll(".nav-item").forEach(nav => { if (nav.dataset?.tab === tabId) nav.classList.add("active"); else nav.classList.remove("active"); });  
}  
document.querySelectorAll(".nav-item, .mobile-nav").forEach(el => { if (el.dataset?.tab) { el.addEventListener("click", () => { switchTab(el.dataset.tab); if (window.innerWidth <= 780) { let mobileSidebar = document.getElementById("mobileSidebar"); let overlay = document.getElementById("overlay"); if (mobileSidebar) mobileSidebar.classList.remove("open"); if (overlay) overlay.style.display = "none"; } }); } });  
document.getElementById("mobileMenuBtn").onclick = () => { let mobileSidebar = document.getElementById("mobileSidebar"); let overlay = document.getElementById("overlay"); if (mobileSidebar) mobileSidebar.classList.add("open"); if (overlay) overlay.style.display = "block"; };  
document.getElementById("overlay").onclick = () => { let mobileSidebar = document.getElementById("mobileSidebar"); let overlay = document.getElementById("overlay"); if (mobileSidebar) mobileSidebar.classList.remove("open"); if (overlay) overlay.style.display = "none"; };  

if (window._vmsIntervals) { window._vmsIntervals.forEach(clearInterval); }  
window._vmsIntervals = [];  
secureLoad();
vmsSite_load();   
setSite(SITE_ID);
renderDashboard();  
renderLogTable();  
function initQueue() { try { const saved = localStorage.getItem("vms_sync_queue"); if (saved) syncQueue = JSON.parse(saved); updateQueueStatus(); } catch (e) { console.error("initQueue error:", e); } }  
initQueue();  
pullFromSheet();  
let syncInterval = setInterval(() => { if (navigator.onLine) pullFromSheet(); }, SYNC_INTERVAL_MS);  
let queueInterval = setInterval(() => { if (navigator.onLine && syncQueue.length > 0) processQueue(); }, 5000);  
window._vmsIntervals.push(syncInterval, queueInterval);  
window.addEventListener("beforeunload", () => { if (scannerInstance) { try { scannerInstance.stop(); scannerInstance.clear(); } catch (e) { console.error("beforeunload scanner error:", e); } } if (cameraResetInterval) clearInterval(cameraResetInterval); window._vmsIntervals.forEach(clearInterval); secureSave(); });  

function vmsSite_load() { try { let stored = localStorage.getItem("vms_site_names"); if (stored) Object.assign(vmsSiteData.names, JSON.parse(stored)); } catch(e) { console.error("vmsSite_load error:", e); } vmsSite_applyToUI(); }  
function vmsSite_applyToUI() {
    if (!window.vmsSiteData || !vmsSiteData.names) {
        console.warn("vmsSiteData belum siap (skip render)");
        return;
    }
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(sel => { if (!sel) return; Array.from(sel.options).forEach(opt => { let val = opt.value; let siteNames = {}; try { siteNames = JSON.parse(localStorage.getItem("vms_site_names") || "{}"); } catch(e) { console.error("parse error:", e); } if (siteNames[val]) { let icon = opt.textContent.substring(0, 2); let hasIcon = icon === "🏭" || icon === "🏢" || icon === "🏬"; opt.textContent = (hasIcon ? icon + " " : "") + siteNames[val]; } }); });  
}  
function vmsSite_save() { localStorage.setItem("vms_site_names", JSON.stringify(vmsSiteData.names)); return true; }  
function vmsSite_open() { let modal = document.getElementById("vmsSiteModal"); if (modal) { modal.style.display = "flex"; let vmsA = document.getElementById("vmsA"); if (vmsA) vmsA.value = vmsSiteData.names.SITE_A || "SITE A"; let vmsB = document.getElementById("vmsB"); if (vmsB) vmsB.value = vmsSiteData.names.SITE_B || "SITE B"; let vmsC = document.getElementById("vmsC"); if (vmsC) vmsC.value = vmsSiteData.names.SITE_C || "SITE C"; } }  
function vmsSite_close() { let modal = document.getElementById("vmsSiteModal"); if (modal) modal.style.display = "none"; }  
function vmsSite_submit() {  
    let vmsA = document.getElementById("vmsA");  
    let vmsB = document.getElementById("vmsB");  
    let vmsC = document.getElementById("vmsC");  
    let newNames = { ...vmsSiteData.names };  
    if (vmsA) newNames.SITE_A = vmsA.value.trim() || "SITE A";  
    if (vmsB) newNames.SITE_B = vmsB.value.trim() || "SITE B";  
    if (vmsC) newNames.SITE_C = vmsC.value.trim() || "SITE C";  
    vmsSiteData.names = newNames;  
    localStorage.setItem("vms_site_names", JSON.stringify(vmsSiteData.names));  
    vmsSite_applyToUI();  
    if (typeof toast === "function") toast("✅ Site names saved!", "success");  
    vmsSite_close();  
}  
vmsSite_load();  
</script>
