" height="90"></canvas></div><div class="form-card"><canvas id="categoryChart" height="90"></canvas></div></div><div id="registerPane" class="tab-pane"><div class="form-card"><div class="grid-2"><div class="input-field"><label>Full name</label><input type="text" id="regName" placeholder="John Carter"></div><div class="input-field"><label>Company</label><input type="text" id="regCompany" placeholder="PT Nusantara"></div><div class="input-field"><label>Category</label><select id="regCategory"><option value="UMUM">UMUM</option><option value="VIP">VIP</option><option value="VVIP">VVIP</option></select></div><div class="input-field"><label>Purpose</label><select id="regPurpose"><option>Meeting</option><option>Interview</option><option>Service</option><option>Lainnya</option></select><input type="text" id="regCustomPurpose" placeholder="Other purpose" style="margin-top:8px;"></div><div class="input-field"><label>PIC</label><input type="text" id="regPic" placeholder="Budi Santoso"></div><div class="input-field"><label>Department</label><input type="text" id="regDept" placeholder="IT / HR"></div><div class="input-field"><label>Start date</label><input type="date" id="regStartDate"></div><div class="input-field"><label>Expired date</label><input type="date" id="regExpDate"></div><div class="input-field"><label>Photo</label><input type="file" id="regPhotoFile" accept="image/*"><img id="previewPhotoThumb" width="50" style="margin-top:8px; border-radius:12px;"></div></div><div style="display:flex; gap:16px; margin-top:24px;"><button id="walkinBtn">⚡ Walk-in</button><button id="generateQRBtn">🔐 Generate QR</button></div></div></div><div id="scannerPane" class="tab-pane">

<script>
// ================= KONFIGURASI =================
// ⚠️ GANTI URL INI DENGAN URL APPS SCRIPT ANDA ⚠️
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyS7D8PQK-7NPJdxGdGwgAxGDNh7Sz2lJ7KCKnJOx3cNONAs_B9hsVCfZPa5GXvMovb/exec";
const SYNC_INTERVAL_MS = 5000;

// ================= GLOBAL VARIABLES =================
let visitors = {};
let logs = [];
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let syncQueue = [];
let isProcessingQueue = false;
let syncLock = false;
let actionMutex = false;
let scannerInstance = null;
let isScanning = false;
let processingRegs = new Set();
let lastScanTime = {};
let scanCounter = 0;
const SCAN_COOLDOWN_MS = 3000;

// License key (sama untuk semua device - sync dari localStorage)
let currentLicense = localStorage.getItem("vms_license_key") || "";
let isLicenseValid = false;

// Site names storage
let vmsSiteData = { names: { SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" } };

// ================= HELPER FUNCTIONS =================
function toast(msg, type = "info") {
    let t = document.createElement("div");
    t.className = `toast-msg ${type}`;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
window.toast = toast;

function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }

function lockUI(lock) {
    document.body.style.pointerEvents = lock ? "none" : "auto";
    document.body.style.opacity = lock ? "0.6" : "1";
}

function generateReg() {
    return "REG" + Date.now() + Math.floor(Math.random() * 10000);
}

function getSiteName(siteId) {
    let names = {};
    try { names = JSON.parse(localStorage.getItem("vms_site_names") || "{}"); } catch(e) {}
    let name = names[siteId];
    if (!name || name.trim() === "") {
        name = siteId.replace(/_/g, " ");
        names[siteId] = name;
        localStorage.setItem("vms_site_names", JSON.stringify(names));
    }
    return name;
}

// ================= LICENSE CHECK (SAMA UNTUK SEMUA DEVICE) =================
function checkLicense() {
    // License key disimpan di localStorage, akan sync via pullFromSheet nanti
    let savedLicense = localStorage.getItem("vms_license_key");
    if (savedLicense && savedLicense.length > 10) {
        currentLicense = savedLicense;
        isLicenseValid = true;
        document.getElementById("licenseStatusBadge").innerText = "✅ ELITE";
        document.getElementById("licenseStatusBadge").style.background = "#10b981";
        document.getElementById("licenseStatusBadge").style.color = "white";
    } else {
        isLicenseValid = false;
        document.getElementById("licenseStatusBadge").innerText = "⚠️ TRIAL";
        document.getElementById("licenseStatusBadge").style.background = "#f59e0b";
    }
    return isLicenseValid;
}

function activateLicense(key) {
    if (key && key.length > 10) {
        localStorage.setItem("vms_license_key", key);
        currentLicense = key;
        isLicenseValid = true;
        toast("✅ License activated!", "success");
        checkLicense();
        return true;
    } else {
        toast("❌ License key tidak valid", "error");
        return false;
    }
}

// ================= STORAGE FUNCTIONS =================
function secureSave() {
    try {
        let keys = Object.keys(visitors);
        if (keys.length > 500) {
            keys.sort((a, b) => (visitors[a].updatedAt || 0) - (visitors[b].updatedAt || 0));
            keys.slice(0, keys.length - 500).forEach(k => delete visitors[k]);
        }
        if (logs.length > 500) logs = logs.slice(0, 400);
        localStorage.setItem("vms_visitors", JSON.stringify(visitors));
        localStorage.setItem("vms_logs", JSON.stringify(logs));
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
    } catch (e) {
        console.error("STORAGE ERROR:", e);
        if (e.name === 'QuotaExceededError') {
            logs = logs.slice(0, 50);
            localStorage.setItem("vms_logs", JSON.stringify(logs));
            toast("⚠️ Memori HP Penuh", "warning");
        }
    }
}

function secureLoad() {
    try {
        visitors = JSON.parse(localStorage.getItem("vms_visitors")) || {};
        logs = JSON.parse(localStorage.getItem("vms_logs")) || [];
        syncQueue = JSON.parse(localStorage.getItem("vms_sync_queue")) || [];
    } catch(e) { console.error("secureLoad error:", e); }
}

function addLocalLog(reg, action) {
    let v = visitors[reg];
    logs.unshift({
        reg: reg,
        nama: v?.nama || reg,
        perusahaan: v?.perusahaan || "-",
        kategori: v?.kategori || "UMUM",
        type: action,
        timestamp: Date.now(),
        site_id: SITE_ID
    });
    if (logs.length > 500) logs = logs.slice(0, 400);
    secureSave();
}

// ================= API CALLS (FOTO DIKIRIM LENGKAP) =================
async function apiCall(params) {
    if (!navigator.onLine) return { status: "offline" };
    try {
        // Tambahkan license key ke setiap request
        params.license_key = currentLicense;
        
        const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams(params)
        });
        if (!res.ok) throw new Error("Server Response Error");
        return await res.json();
    } catch (e) {
        console.warn("API Call Fail:", e.message);
        return { status: "error_network" };
    }
}

async function registerVisitor(reg, data) {
    // Kirim foto BASE64 LENGKAP ke server
    let photoToSend = data.foto || "";
    
    return await apiCall({
        action: "register",
        reg: reg,
        nama: data.nama,
        perusahaan: data.perusahaan,
        tujuan: data.tujuan,
        pic: data.pic,
        dept: data.dept,
        startDate: data.startDate,
        expDate: data.expDate,
        kategori: data.kategori,
        site_id: SITE_ID,
        site_name: getSiteName(SITE_ID),
        photoBase64: photoToSend
    });
}

async function walkinVisitor(reg, data) {
    return await apiCall({
        action: "walkin",
        reg: reg,
        nama: data.nama,
        perusahaan: data.perusahaan,
        tujuan: data.tujuan,
        pic: data.pic,
        dept: data.dept,
        startDate: data.startDate,
        expDate: data.expDate,
        kategori: data.kategori,
        site_id: SITE_ID,
        site_name: getSiteName(SITE_ID)
    });
}

async function checkinVisitor(reg) {
    return await apiCall({ action: "checkin", reg: reg, site_id: SITE_ID });
}

async function checkoutVisitor(reg) {
    return await apiCall({ action: "checkout", reg: reg, site_id: SITE_ID });
}

// ================= SYNC FUNCTIONS (PULL DATA LENGKAP DENGAN FOTO URL) =================
async function pullFromSheet() {
    if (syncLock || !navigator.onLine) return;
    syncLock = true;
    try {
        const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "pull", site_id: SITE_ID, license_key: currentLicense })
        });
        const result = await res.json();
        
        if (result.status === "success" && result.data && result.data.length > 0) {
            const headers = result.data[0];
            const idx = {
                nama: headers.indexOf("Nama"),
                perusahaan: headers.indexOf("Perusahaan"),
                tujuan: headers.indexOf("Tujuan"),
                pic: headers.indexOf("PIC"),
                startDate: headers.indexOf("Start"),
                expDate: headers.indexOf("Exp"),
                kategori: headers.indexOf("Kategori"),
                dept: headers.indexOf("Dept"),
                reg: headers.indexOf("REG"),
                status: headers.indexOf("Status"),
                site: headers.indexOf("Site"),
                photoUrl: headers.indexOf("Keterangan")
            };
            
            const rows = result.data.slice(1);
            let updated = 0;
            
            rows.forEach(row => {
                const reg = row[idx.reg];
                if (!reg) return;
                
                // Ambil foto URL dari Google Drive (kolom Keterangan)
                let photoUrl = "";
                if (row[idx.photoUrl] && row[idx.photoUrl].startsWith("https://")) {
                    photoUrl = row[idx.photoUrl];
                } else if (visitors[reg]?.foto && visitors[reg].foto.startsWith("https://")) {
                    photoUrl = visitors[reg].foto;
                } else if (visitors[reg]?.foto && visitors[reg].foto.startsWith("data:image")) {
                    photoUrl = visitors[reg].foto;
                }
                
                // UPDATE ATAU TAMBAH DATA LENGKAP
                visitors[reg] = {
                    nama: row[idx.nama] || visitors[reg]?.nama || "Unknown",
                    perusahaan: row[idx.perusahaan] || visitors[reg]?.perusahaan || "-",
                    tujuan: row[idx.tujuan] || visitors[reg]?.tujuan || "-",
                    pic: row[idx.pic] || visitors[reg]?.pic || "-",
                    dept: row[idx.dept] || visitors[reg]?.dept || "-",
                    startDate: row[idx.startDate] || visitors[reg]?.startDate || "-",
                    expDate: row[idx.expDate] || visitors[reg]?.expDate || "-",
                    kategori: row[idx.kategori] || visitors[reg]?.kategori || "UMUM",
                    currentStatus: row[idx.status] || visitors[reg]?.currentStatus || "OUT",
                    site: row[idx.site] || visitors[reg]?.site || SITE_ID,
                    foto: photoUrl,
                    updatedAt: Date.now()
                };
                updated++;
            });
            
            if (updated > 0) {
                secureSave();
                renderDashboard();
                renderLogTable();
                console.log(`✅ Sync: ${updated} data diperbarui`);
            }
        }
        
        // Cek juga apakah ada license key dari server
        if (result.license_key) {
            localStorage.setItem("vms_license_key", result.license_key);
            checkLicense();
        }
        
    } catch (e) {
        console.warn("Pull Sync Fail:", e.message);
    } finally {
        syncLock = false;
    }
}

function addToQueue(action, reg, data = {}) {
    if (!Array.isArray(syncQueue)) syncQueue = [];
    const isExist = syncQueue.find(item => item.reg === reg && item.action === action);
    if (isExist) return;
    syncQueue.push({ action, reg, data, retryCount: 0, createdAt: Date.now() });
    localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
}

async function processQueue() {
    if (isProcessingQueue || syncQueue.length === 0) return;
    isProcessingQueue = true;
    const newQueue = [];
    for (const item of syncQueue) {
        let result;
        try {
            if (item.action === "checkin") result = await checkinVisitor(item.reg);
            else if (item.action === "checkout") result = await checkoutVisitor(item.reg);
            else if (item.action === "register") result = await registerVisitor(item.reg, item.data);
            else if (item.action === "walkin") result = await walkinVisitor(item.reg, item.data);
            if (result && (result.status === "success" || result.status === "duplicate")) continue;
        } catch(e) { result = { status: "error" }; }
        item.retryCount++;
        if (item.retryCount <= 3) newQueue.push(item);
    }
    syncQueue = newQueue;
    localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
    isProcessingQueue = false;
}

// ================= PDF GENERATION (FIXED) =================
async function ensureJSPDF() {
    if (window.jspdf) return true;
    return new Promise(resolve => {
        let i = 0, iv = setInterval(() => {
            if (window.jspdf) { clearInterval(iv); resolve(true); }
            if (i++ > 100) { clearInterval(iv); resolve(false); }
        }, 100);
    });
}

async function downloadPDF(reg, data) {
    try {
        await ensureJSPDF();
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a6" });
        
        // Fallback: ambil data dari visitors jika data tidak lengkap
        let visitorData = { ...data };
        const fromStorage = visitors[reg];
        if (fromStorage) {
            visitorData = { ...visitorData, ...fromStorage };
        }
        
        // Header
        doc.setFillColor(31, 78, 74);
        doc.rect(0, 0, 105, 25, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(14);
        doc.setFont(undefined, "bold");
        doc.text("VISITOR PASS", 52.5, 12, { align: "center" });
        doc.setFontSize(8);
        doc.text("SECURITY AUTHORIZED", 52.5, 18, { align: "center" });
        
        // Foto (support base64 dan URL)
        if (visitorData.foto && visitorData.foto.length > 100) {
            try {
                let fotoToUse = visitorData.foto;
                // Jika URL Google Drive, konversi ke direct download
                if (fotoToUse.includes("drive.google.com")) {
                    // Skip dulu untuk PDF karena butuh CORS
                    console.log("Skip foto dari Drive untuk PDF");
                } else if (fotoToUse.startsWith("data:image")) {
                    doc.setDrawColor(200, 200, 200);
                    doc.rect(32.5, 30, 40, 50);
                    doc.addImage(fotoToUse, "JPEG", 33, 30.5, 39, 49);
                }
            } catch(e) { console.error("Foto error:", e); }
        }
        
        // Nama dan Perusahaan
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.setFont(undefined, "bold");
        doc.text((visitorData.nama || "Unknown").toUpperCase(), 52.5, 90, { align: "center" });
        doc.setFontSize(9);
        doc.setFont(undefined, "normal");
        doc.text(visitorData.perusahaan || "-", 52.5, 96, { align: "center" });
        
        // Garis pembatas
        doc.setDrawColor(31, 78, 74);
        doc.setLineWidth(0.5);
        doc.line(15, 102, 90, 102);
        
        // Detail
        doc.setFontSize(8);
        let y = 108;
        doc.text(`PIC      : ${visitorData.pic || "-"}`, 15, y);
        doc.text(`DATE     : ${visitorData.startDate || "-"}`, 15, y + 5);
        doc.text(`VALID TO : ${visitorData.expDate || "-"}`, 15, y + 10);
        
        // QR Code
        if (visitorData.qrImage) {
            doc.addImage(visitorData.qrImage, "PNG", 70, 115, 25, 25);
        }
        
        // REG
        doc.setFontSize(7);
        doc.setTextColor(150, 150, 150);
        doc.text(reg, 82.5, 142, { align: "center" });
        
        // Footer
        doc.setFontSize(6);
        doc.text("Property of Security Department. Must be worn at all times.", 52.5, 146, { align: "center" });
        
        doc.save(`VISITOR_PASS_${reg}.pdf`);
        toast("Badge Visitor berhasil di-download", "success");
        return true;
    } catch(err) {
        console.error("PDF Error:", err);
        toast("Gagal membuat Badge", "error");
        return false;
    }
}

    if (isScanning) return;

            async (decodedText) => {

            },
            (error) => {}
        );
        isScanning = true;
        toast("Scanner Aktif", "success");
    } catch(err) { toast("Gagal: " + err.message, "error"); isScanning = false; }
}

async function stopScanner() {
    if (scannerInstance && isScanning) {
        try { await scannerInstance.stop(); await scannerInstance.clear(); } catch(err) {}
    }
    isScanning = false;
}

// ================= PROCESS SCAN =================
let globalScanLock = false;
setInterval(() => scanCounter = 0, 60000);

async function processScan(qrText) {
    if (actionMutex || globalScanLock) return false;
    if (scanCounter > 20) { toast("Scanner overload", "warning"); return false; }
    scanCounter++;
    globalScanLock = true;
    qrText = qrText.trim();
    const mode = document.getElementById("scanMode").value;
    let reg = null;
    if (qrText.match(/^REG\d+/i)) reg = qrText;
    else if (qrText.includes("|")) { const parts = qrText.split("|"); if (parts[0].match(/^REG\d+/i)) reg = parts[0]; }
    
    if (!reg) { toast("QR tidak valid!", "error"); globalScanLock = false; return false; }
    
    const nowTime = Date.now();
    if (lastScanTime[reg] && nowTime - lastScanTime[reg] < SCAN_COOLDOWN_MS) { globalScanLock = false; return false; }
    lastScanTime[reg] = nowTime;
    if (processingRegs.has(reg)) { globalScanLock = false; return false; }
    processingRegs.add(reg);
    actionMutex = true;
    try {
        let visitor = visitors[reg] || { nama: "Visitor", currentStatus: "OUT" };
        if (mode === "CHECK_IN") {
            let result = await checkinVisitor(reg);
            if (result.status === "success") {
                visitor.currentStatus = "IN";
                visitors[reg] = visitor;
                addLocalLog(reg, "CHECK_IN");
                vibrate();
                toast(`✅ IN: ${visitor.nama}`, "success");
            } else { toast("Gagal Check-in", "error"); }
        } else {
            let result = await checkoutVisitor(reg);
            if (result.status === "success") {
                visitor.currentStatus = "OUT";
                visitors[reg] = visitor;
                addLocalLog(reg, "CHECK_OUT");
                vibrate();
                toast(`✅ OUT: ${visitor.nama}`, "success");
            } else { toast("Gagal Check-out", "error"); }
        }
        renderDashboard();
        renderLogTable();
        secureSave();
        await pullFromSheet();
        return true;
    } catch(e) { console.error("processScan error:", e); return false; }
    finally { actionMutex = false; globalScanLock = false; setTimeout(() => processingRegs.delete(reg), 1000); }
}

};

document.getElementById("walkinBtn").onclick = async () => {
    if (actionMutex) return;
    actionMutex = true;
    lockUI(true);
    try {
        let reg = generateReg();
        let now = new Date();
        let exp = new Date(now);
        exp.setDate(exp.getDate() + 1);
        let walkData = { nama: `WALK-IN ${now.getHours()}:${now.getMinutes()}`, perusahaan: "Guest Visitor", kategori: "UMUM", tujuan: "Immediate Visit", pic: "Reception", dept: "Umum", startDate: now.toISOString().slice(0, 10), expDate: exp.toISOString().slice(0, 10), foto: "", sessions: [], currentStatus: "OUT", updatedAt: Date.now() };
        visitors[reg] = walkData;
        addLocalLog(reg, "WALK-IN");
        secureSave();
        let result = await walkinVisitor(reg, walkData);
        if (!result || result.status !== "success") addToQueue("walkin", reg, walkData);
        toast(`✅ Walk-in registered ${reg}`, "success");
        vibrate();
        generateQRandShow(reg, walkData);
        renderDashboard();
        renderLogTable();
        await pullFromSheet();
    } catch(e) { console.error("walkinBtn error:", e); toast("Terjadi kesalahan", "error"); }
    finally { actionMutex = false; lockUI(false); }
};

document.getElementById("startCamBtn").onclick = async () => { document.getElementById("cameraPreview").innerHTML = ""; await stopScanner(); if (scannerInstance) { try { await scannerInstance.clear(); } catch(e) {} scannerInstance = null; } await startScanner(); };
document.getElementById("stopCamBtn").onclick = async () => { await stopScanner(); if (scannerInstance) { try { await scannerInstance.clear(); } catch(e) {} scannerInstance = null; } toast("Kamera berhenti", "info"); };
document.getElementById("uploadQrBtn").onclick = () => document.getElementById("uploadQrFile")?.click();
document.getElementById("uploadQrFile").onchange = async (e) => {
    if (actionMutex) return;
    actionMutex = true;
    lockUI(true);
    try {
        let file = e.target.files[0];
        if (!file) return;
        let url = URL.createObjectURL(file);
        let img = new Image();
        img.src = url;
        await img.decode();
        URL.revokeObjectURL(url);
        let canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        canvas.getContext("2d").drawImage(img, 0, 0);
        let scanner = new Html5Qrcode("temp-reader");
        let decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });
        await processScan(decoded);
        await scanner.clear();
        document.getElementById("temp-reader").innerHTML = "";
    } catch(err) { toast("QR tidak terbaca", "error"); }
    finally { actionMutex = false; lockUI(false); }
};

document.getElementById("manualProcess").onclick = async () => {
    if (actionMutex) return;
    actionMutex = true;
    lockUI(true);
    try {
        let reg = document.getElementById("manualReg").value.trim();
        const mode = document.getElementById("scanMode").value;
        if (!reg || !reg.match(/^REG\d+/i)) { toast("Format REG salah!", "error"); return; }
        let visitor = visitors[reg];
        if (!visitor) { toast("REG tidak ditemukan!", "error"); return; }
        if (mode === "CHECK_IN") {
            let result = await checkinVisitor(reg);
            if (result.status === "success") {
                visitor.currentStatus = "IN";
                visitors[reg] = visitor;
                addLocalLog(reg, "CHECK_IN");
                vibrate();
                toast(`Check-in ${visitor.nama} success`, "success");
            } else { addToQueue("checkin", reg); toast("Masuk queue", "warning"); }
        } else {
            let result = await checkoutVisitor(reg);
            if (result.status === "success") {
                visitor.currentStatus = "OUT";
                visitors[reg] = visitor;
                addLocalLog(reg, "CHECK_OUT");
                vibrate();
                toast(`Check-out ${visitor.nama} success`, "success");
            } else { addToQueue("checkout", reg); toast("Masuk queue", "warning"); }
        }
        renderDashboard();
        renderLogTable();
        secureSave();
        await pullFromSheet();
    } catch(e) { console.error("manualProcess error:", e); toast("Terjadi kesalahan", "error"); }
    finally { actionMutex = false; lockUI(false); }
};

document.getElementById("refreshLogsBtn").onclick = () => { pullFromSheet(); renderLogTable(); };
document.getElementById("selectAllBtn").onclick = () => document.querySelectorAll(".logCheckItem").forEach(c => c.checked = true);
document.getElementById("deselectAllBtn").onclick = () => document.querySelectorAll(".logCheckItem").forEach(c => c.checked = false);
document.getElementById("deleteSelectedBtn").onclick = () => {
    let regs = [...new Set([...document.querySelectorAll(".logCheckItem:checked")].map(c => c.dataset.reg))];
    regs.forEach(r => delete visitors[r]);
    logs = logs.filter(l => !regs.includes(l.reg));
    secureSave();
    renderDashboard();
    renderLogTable();
    toast(`Berhasil menghapus ${regs.length} data`, "success");
};
document.getElementById("deleteAllBtn").onclick = () => { visitors = {}; logs = []; secureSave(); renderDashboard(); renderLogTable(); toast("All data cleared", "info"); };
document.getElementById("backupAction").onclick = () => { try { let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({ visitors, logs })], { type: "application/json" })); a.download = `vms_backup_${Date.now()}.json`; a.click(); toast("Backup ready", "success"); } catch(e) { toast("Backup gagal", "error"); } };
document.getElementById("resetDatabaseAction").onclick = () => { visitors = {}; logs = []; secureSave(); renderDashboard(); renderLogTable(); toast("Database reset", "info"); };
document.getElementById("regPhotoFile").onchange = (e) => { if (e.target.files[0]) { let r = new FileReader(); r.onload = ev => { let preview = document.getElementById("previewPhotoThumb"); if (preview) preview.src = ev.target.result; }; r.readAsDataURL(e.target.files[0]); } };
document.getElementById("submitLicenseBtn").onclick = () => { 
    let input = document.getElementById("licenseInput"); 
    if (input && input.value) {
        if (activateLicense(input.value)) {
            input.value = "";
            // Setelah aktivasi, sync ke semua device via pull
            pullFromSheet();
        }
    } else {
        toast("Masukkan license key", "warning");
    }
};
document.getElementById("siteSelector").onchange = (e) => setSite(e.target.value);
document.getElementById("siteSelectorTop").onchange = (e) => setSite(e.target.value);

function exportToExcel() {
    try {
        if (!window.XLSX) { toast("Excel engine belum siap", "error"); return; }
        let dataForExcel = [];
        Object.entries(visitors).forEach(([reg, visitor]) => {
            let jamMasuk = "-", jamKeluar = "-", keterangan = "";
            if (visitor.sessions && visitor.sessions.length > 0) {
                let last = visitor.sessions[visitor.sessions.length - 1];
                if (last.checkIn) jamMasuk = new Date(last.checkIn).toLocaleString("id-ID");
                if (last.checkOut) jamKeluar = new Date(last.checkOut).toLocaleString("id-ID");
                keterangan = visitor.currentStatus === "IN" ? "Di Dalam" : (last.checkOut ? "Sudah Keluar" : "Belum Check-in");
            } else keterangan = "Data Terdaftar";
            dataForExcel.push({ "Nama": visitor.nama || "-", "Perusahaan": visitor.perusahaan || "-", "Kategori": visitor.kategori || "-", "PIC": visitor.pic || "-", "Jam Masuk": jamMasuk, "Jam Keluar": jamKeluar, "REG": reg, "Keterangan": keterangan });
        });
        if (dataForExcel.length === 0) { toast("Tidak ada data", "warning"); return; }
        let ws = XLSX.utils.json_to_sheet(dataForExcel);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
        XLSX.writeFile(wb, `VMS_Report_${new Date().toISOString().slice(0, 19).replace(/:/g, "-")}.xlsx`);
        toast("✅ Export Excel berhasil", "success");
    } catch(err) { toast("Export gagal", "error"); }
}
document.getElementById("exportExcelAction").onclick = exportToExcel;

let panes = { dashboard: document.getElementById("dashboardPane"), register: document.getElementById("registerPane"), scanner: document.getElementById("scannerPane"), logs: document.getElementById("logsPane") };
function switchTab(tabId) {
    Object.values(panes).forEach(p => p?.classList.remove("active-pane"));
    if (panes[tabId]) panes[tabId].classList.add("active-pane");
    document.querySelectorAll(".nav-item").forEach(nav => { if (nav.dataset?.tab === tabId) nav.classList.add("active"); else nav.classList.remove("active"); });
}
document.querySelectorAll(".nav-item, .mobile-nav").forEach(el => { if (el.dataset?.tab) { el.addEventListener("click", () => { switchTab(el.dataset.tab); if (window.innerWidth <= 780) { document.getElementById("mobileSidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; } }); } });
document.getElementById("mobileMenuBtn").onclick = () => { document.getElementById("mobileSidebar").classList.add("open"); document.getElementById("overlay").style.display = "block"; };
document.getElementById("overlay").onclick = () => { document.getElementById("mobileSidebar").classList.remove("open"); document.getElementById("overlay").style.display = "none"; };

// ================= INITIALIZATION =================
async function initVmsSystem() {
    secureLoad();
    vmsSite_load();
    checkLicense();
    setSite(SITE_ID);
    renderDashboard();
    renderLogTable();
    getAvailableCameras();
    if (navigator.onLine) {
        toast("🔄 Sinkronisasi data...", "info");
        await pullFromSheet();
    }
    setInterval(() => { if (navigator.onLine) pullFromSheet(); }, SYNC_INTERVAL_MS);
    setInterval(() => { if (navigator.onLine && syncQueue.length > 0) processQueue(); }, 5000);
}
initVmsSystem();

window.addEventListener("beforeunload", () => {
    if (scannerInstance) { try { scannerInstance.stop(); scannerInstance.clear(); } catch(e) {} }
    secureSave();
});
</script>
