<script>
// ================= GLOBAL DATA CORE & AUTO-SYNC =================
let vmsData = {
    logs: [],       
    visitors: {}    
};

let centralData = []; 

async function syncMultiDevice() {
    if (!navigator.onLine) return;
    try {
        // Tambahkan timestamp agar browser tidak ambil data lama (Cache)
        const response = await fetch(`${APPS_SCRIPT_URL}?action=pull&t=${Date.now()}`, {
            method: 'GET',
            redirect: 'follow' 
        });
        
        const result = await response.json();
        
        if (result.status === "success" && result.data) {
            const headers = result.data[0];
            const rows = result.data.slice(1);
            
            // Mapping data agar key-nya sesuai dengan yang dipahami renderLogTable
            centralData = rows.map(row => {
                let obj = {};
                headers.forEach((h, i) => {
                    // Paksa semua key jadi lowercase agar sinkron dengan logika visitors[reg]
                    let key = h.toString().toLowerCase().trim();
                    obj[key] = row[i];
                });
                return obj;
            });
            
            // Update logs utama
            logs = centralData.map(item => ({
                reg: item.reg,
                nama: item.nama,
                perusahaan: item.perusahaan,
                kategori: item.kategori,
                timestamp: new Date(item.logtime).getTime(),
                status: item.status,
                site_id: item.site
            }));
            
            renderLogTable();
            renderDashboard();
            console.log("✅ Data Terupdate Detik Ini!");
        }
    } catch (err) {
        console.warn("⚠️ Sync Gagal:", err.message);
    }
}


// Jalankan sync otomatis tiap 60 detik (bisa lo perpendek jadi 30000 kalau mau lebih cepat)
setInterval(syncMultiDevice, 60000);




// ================= FAILSAFE CORE =================
window.VMS_SAFE = true;

window.addEventListener("error", function(e){
    console.error("GLOBAL ERROR:", e.message);
    if(window.toast) toast("⚠️ System error terdeteksi", "error");
});

window.addEventListener("unhandledrejection", function(e){
    console.error("PROMISE ERROR:", e.reason);
    if(window.toast) toast("⚠️ Network/async error", "warning");
});

// ================= SECURITY & HARDENING =================
const SECRET = "OMNIGUARD_SECRET_2026";
const SCAN_COOLDOWN_MS = 3000;
const SCAN_MAX_PER_MIN = 20;
let scanCounter = 0;
let syncLock = false;
let globalScanLock = false;

setInterval(() => scanCounter = 0, 60000);


function lockUI(lock=true){
    document.body.style.pointerEvents = lock ? "none" : "auto";
    document.body.style.opacity = lock ? "0.6" : "1";
}

function vibrate(){
    if (navigator.vibrate) navigator.vibrate(100);
}

async function sha256(str){
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,'0'))
    .join('');
}

// ================= INIT =================
(function initSiteNameDefault() {  
    let saved = localStorage.getItem("vms_site_names");  
    if (!saved) {  
        localStorage.setItem("vms_site_names", JSON.stringify({ SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" }));  
    }  
})();  

var vmsSiteData = {
  names: { SITE_A: "SITE A", SITE_B: "SITE B", SITE_C: "SITE C" }
};

// ⚠️ GANTI URL INI DENGAN URL DEPLOYMENT APPS SCRIPT ANDA ⚠️
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3kDhwwU6_in5Vc7B8jgJtr5x2Ilep8S9x93NzeDrm-TDLdY9xhdGzFo7JRtw7rtY/exec";  
const SYNC_INTERVAL_MS = 10000;  
// ================= CORE VARIABLES & QUEUE ENGINE =================
let visitors = {};  
let logs = [];  
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";  
let isProcessingQueue = false;  
let syncQueue = [];  
let lastScanTime = {};  
let processingRegs = new Set();  
let scannerInstance = null;  
let isScanning = false;  
let currentCameraId = null;  
let cameraResetInterval = null;  
let actionMutex = false;  
let localStorageVersion = parseInt(localStorage.getItem("vms_version") || "0");  

function incrementVersion() {
    localStorageVersion++;
    localStorage.setItem("vms_version", localStorageVersion);
}

function updateQueueStatus() {  
    let div = document.getElementById("queueStatusIndicator");  
    if (!div) {  
        div = document.createElement("div");  
        div.id = "queueStatusIndicator";  
        div.className = "queue-status";  
        document.body.appendChild(div);  
    }  
    div.innerHTML = syncQueue.length 
        ? `📦 Queue: ${syncQueue.length}` 
        : `✅ Sync OK`;  
}

// Fungsi Antrean Agar Tidak Halu saat Offline
function addToQueue(action, reg, data = {}) {
    if (!Array.isArray(syncQueue)) syncQueue = [];
    
    // Cegah duplikasi di dalam antrean agar tidak spam server
    const isExist = syncQueue.find(item => item.reg === reg && item.action === action);
    if (isExist) return;

    syncQueue.push({
        action,
        reg,
        data,
        retryCount: 0,
        createdAt: Date.now()
    });

    persistQueue();
    updateQueueStatus();
    console.log("📦 Masuk Antrean:", action, reg);
}

function persistQueue() {
    try {
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
    } catch(e) {
        console.error("Storage Error (Queue):", e);
    }
}


function getSiteName(siteId) {  
    let names = {};  
    try { names = JSON.parse(localStorage.getItem("vms_site_names") || "{}"); } catch(e) { console.error("getSiteName parse error:", e); }  
    let name = names[siteId];  
    if (!name || name.trim() === "" || name === "undefined") {  
        name = siteId.replace(/_/g, " ");  
        names[siteId] = name;  
        localStorage.setItem("vms_site_names", JSON.stringify(names));  
    }  
    return name;  
}  

function toast(msg, type = "info") {  
    let t = document.createElement("div");  
    t.className = `toast-msg ${type}`;  
    t.innerText = msg;  
    document.body.appendChild(t);  
    setTimeout(() => t.remove(), 3000);  
}  
window.toast = toast;  

function generateReg() {  
    let reg; let attempts = 0;  
    do {  
        reg = "REG" + Date.now() + Math.floor(Math.random() * 10000);  
        attempts++;  
        if (attempts > 10) break;  
    } while (visitors[reg]); // CEK GLOBAL REG
    return reg;  
}  

// ================= HARDENED STORAGE (PERBAIKAN FOTO & RAM) =================
function secureSave() {
    try {
        // 1. Manajemen Kapasitas (Biar Oppo A92 lancar)
        // Batasi 500 visitor terbaru agar tidak melebihi 5MB limit LocalStorage
        let keys = Object.keys(visitors);
        if (keys.length > 500) {
            keys.sort((a, b) => (visitors[a].updatedAt || 0) - (visitors[b].updatedAt || 0));
            let toDelete = keys.slice(0, keys.length - 500);
            toDelete.forEach(k => delete visitors[k]);
        }
        
        if (logs.length > 500) {
            logs = logs.slice(0, 400);
        }
        
        // 2. Simpan Data (FOTO TIDAK BOLEH DI-DELETE LAGI)
        // Kita simpan utuh agar saat preview/print PDF foto tetap muncul
        localStorage.setItem("vms_visitors", JSON.stringify(visitors));
        localStorage.setItem("vms_logs", JSON.stringify(logs));
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
        
        if (typeof updateQueueStatus === "function") updateQueueStatus();
    } catch (e) {
        console.error("STORAGE ERROR:", e);
        // Jika storage HP benar-benar penuh (QuotaExceeded), baru kita bersihkan logs
        if (e.name === 'QuotaExceededError') {
            logs = logs.slice(0, 50); 
            localStorage.setItem("vms_logs", JSON.stringify(logs));
            toast("⚠️ Memori HP Penuh, Riwayat Lama Dihapus", "warning");
        }
    }
}

function secureLoad() {  
    try {
        // Ambil data utuh (Termasuk foto yang tersimpan)
        visitors = JSON.parse(localStorage.getItem("vms_visitors")) || {};
        logs = JSON.parse(localStorage.getItem("vms_logs")) || [];
        syncQueue = JSON.parse(localStorage.getItem("vms_sync_queue")) || [];
        
        window.visitors = visitors;
        window.logs = logs;
    } catch(e) {
        console.error("secureLoad error:", e);
        toast("⚠️ Gagal memuat data", "error");
    }
}  

function addLocalLog(reg, action) {  
    let v = visitors[reg]; 
    // Gunakan 'timestamp' agar sama dengan fungsi sort di tabel
    logs.unshift({
        reg: reg,
        nama: v?.nama || reg,
        perusahaan: v?.perusahaan || "-",
        kategori: v?.kategori || "UMUM",
        type: action, // Sesuaikan dengan logika renderLogTable
        timestamp: Date.now(), 
        site_id: SITE_ID
    });
    
    if (logs.length > 500) logs = logs.slice(0, 400);

        // Proteksi RAM: Jangan kirim foto mentah ke Apps Script (biar HP gak lag)
        if (cleanParams.photo && cleanParams.photo.length > 500) {
            cleanParams.photo = "LOCAL_STORAGE_ONLY";

            method: "POST",
            body: new URLSearchParams(cleanParams)
        });

        if (!res.ok) throw new Error("Server Response Error");

        const text = await res.text();
        return JSON.parse(text);
    } catch (e) {
        console.warn("🌐 API Call Fail:", e.message);
        return { status: "error_network" };
    }
}

// ================= POINT 3: SMART SYNC ENGINE (PROTEKSI FOTO) =================
function syncVisitorStatus(sheetData) {  
    if (!Array.isArray(sheetData) || sheetData.length < 2) return;
    
    const headers = sheetData[0]; 
    const idx = {
        nama: headers.indexOf("Nama"),
        perusahaan: headers.indexOf("Perusahaan"),
        reg: headers.indexOf("REG"),
        status: headers.indexOf("Status"),
        kategori: headers.indexOf("Kategori"),
        exp: headers.indexOf("Exp") 
    };

    let adaPerubahan = false;
    for (let i = 1; i < sheetData.length; i++) {
        const row = sheetData[i];
        const reg = row[idx.reg];
        if (!reg) continue;

        const serverStatus = row[idx.status] || "OUT";

        // Update jika: Data belum ada ATAU Status berubah
        if (!visitors[reg] || visitors[reg].currentStatus !== serverStatus) {
            
            // PROTEKSI KRITIKAL: Ambil foto lama dari LocalStorage (HP)
            let existingFoto = (visitors[reg] && visitors[reg].foto) ? visitors[reg].foto : "";
            
            visitors[reg] = {
                ...visitors[reg], 
                nama: row[idx.nama] || "Unknown",
                perusahaan: row[idx.perusahaan] || "-",
                kategori: row[idx.kategori] || "UMUM",
                expDate: row[idx.exp] || "",
                currentStatus: serverStatus,
                foto: existingFoto, // Foto tidak boleh ditimpa server
                updatedAt: Date.now()
            };
            adaPerubahan = true;
        }
    }

    if (adaPerubahan) { 
        secureSave(); 
        renderDashboard(); 
        renderLogTable(); 
    }
}

async function pullFromSheet() {
    if (syncLock || !navigator.onLine) return;
    syncLock = true;
    try {
        const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "pull", site_id: SITE_ID })
        });
        const result = await res.json();
        if (result.status === "success" && result.data) {
            syncVisitorStatus(result.data); 
        }
    } catch (e) {
        console.warn("Pull Sync Fail:", e.message);
    } finally {
        syncLock = false;
    }
}


// ================= QUEUE (FIX LOOP) =================
async function processQueue() {  
    if (isProcessingQueue || syncQueue.length === 0) return;  

    isProcessingQueue = true;  
    const newQueue = [];  

    for (const item of syncQueue) {  
        let result;  

        try {  
            if (item.action === "checkin") result = await checkinVisitor(item.reg);  
            else if (item.action === "checkout") result = await checkoutVisitor(item.reg);  
            else if (item.action === "register") result = await registerVisitor(item.reg, item.data);  
            else if (item.action === "walkin") result = await walkinVisitor(item.reg, item.data);  
        } catch (e) {  
            result = { status: "error" };  
        }  

        console.log("📦 QUEUE RESULT:", result);

        // ✅ SUCCESS → langsung selesai (tidak retry)
        if (result && result.status === "success") {
            continue;
        }

        // ⚠️ duplicate → anggap selesai juga
        if (result && result.status === "duplicate") {
            continue;
        }

        // ❌ selain itu → retry
        item.retryCount = (item.retryCount || 0) + 1;

        if (item.retryCount <= 5) {
            await new Promise(r => setTimeout(r, 1000));
            newQueue.push(item);
        } else {
            console.warn("DROP QUEUE:", item);
        }
    }  

    syncQueue = newQueue;  
    persistQueue();  
    isProcessingQueue = false;  
}

// ================= QR SCAN PROCESS (FIXED) =================
async function processScan(qrText) {  
    if (actionMutex) return false;
    if (globalScanLock) return false;
    if (!qrText || typeof qrText !== "string") return false;
    
    if (scanCounter > SCAN_MAX_PER_MIN) {
        toast("⚠️ Scanner overload, tunggu sebentar", "warning");
        return false;
    }
    scanCounter++;
    
    globalScanLock = true;
    qrText = qrText.trim();  
    const mode = document.getElementById("scanMode").value;  
    
    let reg = null;
    if (qrText.match(/^REG\d+/i)) {
        reg = qrText;
    } else if (qrText.includes("|")) {
        const parts = qrText.split("|");
        if (parts[0].match(/^REG\d+/i)) reg = parts[0];
    } else {
        let validation = await validateQRCode(qrText);
        if (validation.status === "success" && validation.data && validation.data.reg) {
            reg = validation.data.reg;
        }
    }
    
    if (!reg) {
        toast("QR tidak valid!", "error");
        globalScanLock = false;
        return false;
    }
    
    const nowTime = Date.now();  
    if (lastScanTime[reg] && nowTime - lastScanTime[reg] < SCAN_COOLDOWN_MS) { 
        globalScanLock = false; 
        return false;
    }  
    lastScanTime[reg] = nowTime;  
    
    if (processingRegs.has(reg)) { 
        globalScanLock = false; 
        return false;
    }  
    processingRegs.add(reg);  
    actionMutex = true;  
    
    try {  
        // FIX: Cari secara GLOBAL tanpa SITE_ID
        let visitor = visitors[reg]; 
        
        if (!visitor) {  
            // Jika data belum ada di local gate ini, biarkan server yang validasi
            // Data akan ditarik otomatis saat pullFromSheet selanjutnya
            visitor = { nama: "Visitor", currentStatus: "OUT", sessions: [] };
        }  
        
        if (mode === "CHECK_IN") {
            let result = await checkinVisitor(reg);
            if (result.status === "success") {
                visitor.currentStatus = "IN";
                visitors[reg] = visitor; // SIMPAN GLOBAL
                addLocalLog(reg, "CHECK_IN");
                vibrate();
                toast(`✅ IN: ${visitor.nama}`, "success");
            } else {
                toast("Gagal Check-in", "error");
            }
        } else {
            let result = await checkoutVisitor(reg);
            if (result.status === "success") {
                visitor.currentStatus = "OUT";
                visitors[reg] = visitor; // SIMPAN GLOBAL
                addLocalLog(reg, "CHECK_OUT");
                vibrate();
                toast(`✅ OUT: ${visitor.nama}`, "success");
            } else {
                toast("Gagal Check-out", "error");
            }
        }
        renderDashboard();  
        renderLogTable();  
        secureSave();  
        await pullFromSheet();  
        return true;  
    } catch (e) {  
        console.error("processScan error:", e);  
        return false;  
    } finally {  
        actionMutex = false;  
        globalScanLock = false;
        setTimeout(() => processingRegs.delete(reg), 1000);  
    }  
}

async function downloadPDF(reg, data) {  
    try {  
        await ensureJSPDF();  
        const { jsPDF } = window.jspdf;  
        // Menggunakan ukuran A6 (105x148mm) agar lebih pas sebagai standar kartu visitor
        const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a6" });  

        // 1. Header Akses (Background warna gelap khas Security)
        doc.setFillColor(31, 78, 74);  
        doc.rect(0, 0, 105, 25, "F");  
        
        doc.setTextColor(255, 255, 255);  
        doc.setFontSize(14);  
        doc.setFont(undefined, "bold");  
        doc.text("VISITOR PASS", 52.5, 12, { align: "center" });  
        doc.setFontSize(8);
        doc.text("SECURITY AUTHORIZED", 52.5, 18, { align: "center" });

        // 2. Foto Visitor (Posisi Tengah - Standar ID Card Bank)
        if (data.foto && data.foto.startsWith("data:image")) { 
            try { 
                let format = data.foto.includes("png") ? "PNG" : "JPEG";
                // Frame Foto
                doc.setDrawColor(200, 200, 200);
                doc.rect(32.5, 30, 40, 50); 
                doc.addImage(data.foto, format, 33, 30.5, 39, 49); 
            } catch (e) { console.error("Foto error:", e); } 
        }

        // 3. Nama & Info (Text Besar di Tengah)
        doc.setTextColor(0, 0, 0);  
        doc.setFontSize(12);  
        doc.setFont(undefined, "bold");  
        doc.text(data.nama.toUpperCase(), 52.5, 90, { align: "center" });  
        
        doc.setFontSize(9);  
        doc.setFont(undefined, "normal");  
        doc.text(data.perusahaan, 52.5, 96, { align: "center" });  

        // Garis Pembatas
        doc.setDrawColor(31, 78, 74);
        doc.setLineWidth(0.5);
        doc.line(15, 102, 90, 102);

        // 4. Detail Identitas (Layout Bersih)
        doc.setFontSize(8);
        let y = 108;
        doc.text(`PIC      : ${data.pic}`, 15, y);
        doc.text(`DATE     : ${data.startDate}`, 15, y + 5);
        doc.text(`VALID TO : ${data.expDate}`, 15, y + 10);

        // 5. QR Code di pojok bawah (Standar Scan Data Center)
        if (data.qrImage) {
            doc.addImage(data.qrImage, "PNG", 70, 115, 25, 25);
        }

        // Nomor REG di bawah QR
        doc.setFontSize(7);
        doc.setTextColor(150, 150, 150);
        doc.text(reg, 82.5, 142, { align: "center" });

        // 6. Footer Legal
        doc.setFontSize(6);
        doc.text("Property of Security Department. Must be worn at all times.", 52.5, 146, { align: "center" });

        // Download
        doc.save(`VISITOR_PASS_${reg}.pdf`);
        toast("Badge Visitor berhasil di-download", "success");  
        return true;  
    } catch (err) {  
        console.error("PDF Error:", err);  
        toast("Gagal membuat Badge", "error");  
        return false;  
    }  
}


async function ensureJSPDF() {  
    if (window.jspdf) return true;  
    return new Promise(resolve => {  
        let i = 0, iv = setInterval(() => {  
            if (window.jspdf) { clearInterval(iv); resolve(true); }  
            if (i++ > 100) { clearInterval(iv); resolve(false); }  
        }, 100);  
    });  
}

    }  
}

document.addEventListener("DOMContentLoaded", () => {
    getAvailableCameras();
});


async function stopScanner() {  
    if (cameraResetInterval) { clearInterval(cameraResetInterval); cameraResetInterval = null; }  
    if (scannerInstance && isScanning) { 
        try { 
            await scannerInstance.stop(); 
            await scannerInstance.clear(); 
        } catch (err) { 
            console.error("stopScanner error:", err); 
        } 
    }  
    isScanning = false;  
}  

function setSite(site) {  
    SITE_ID = site;  
    localStorage.setItem("vms_site", SITE_ID);  
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(sel => { if (sel && sel.value !== site) sel.value = site; });  
    vmsSite_applyToUI();  
    toast(`Site aktif: ${getSiteName(SITE_ID)}`, "success");  
    renderDashboard();  
    renderLogTable();  
}  

// ================= EVENT HANDLERS =================
document.getElementById("generateQRBtn").onclick = async () => {  
    if (actionMutex) return;  
    actionMutex = true;  
    lockUI(true); 

    try {  
        const nama = document.getElementById("regName").value.trim();  
        const perusahaan = document.getElementById("regCompany").value.trim();  
        const kategori = document.getElementById("regCategory").value;  
        let tujuan = document.getElementById("regPurpose").value;  
        const custom = document.getElementById("regCustomPurpose").value.trim();  
        
        if (tujuan === "Lainnya") tujuan = custom || "Custom";  
        
        const pic = document.getElementById("regPic").value.trim();  
        const dept = document.getElementById("regDept").value.trim();  
        const startDate = document.getElementById("regStartDate").value || new Date().toISOString().slice(0, 10);  
        const expDate = document.getElementById("regExpDate").value;  

        if (!nama || !perusahaan || !pic || !dept || !expDate) { 
            toast("Lengkapi data wajib, Komandan!", "error"); 
            throw new Error("ValidationIncomplete"); 
        }  
      
        const reg = generateReg();  
        let foto = "";  
        const fileInput = document.getElementById("regPhotoFile");
        const file = fileInput ? fileInput.files[0] : null;  

        if (file) {  
            try {  
                const reader = await new Promise((res, rej) => { 
                    const fr = new FileReader(); 
                    fr.onload = () => res(fr.result); 
                    fr.onerror = rej;
                    fr.readAsDataURL(file); 
                });  
                const img = new Image();  
                img.src = reader;  
                await new Promise(r => img.onload = r);  
                const canvas = document.createElement("canvas");  
                const scale = 400 / img.width;  
                canvas.width = 400;  
                canvas.height = img.height * scale;  
                canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);  
                foto = canvas.toDataURL("image/jpeg", 0.5);  
            } catch (err) { console.warn("Foto gagal."); }  
        }  

        const dataLocal = { 
            nama, perusahaan, kategori, tujuan, pic, dept, 
            startDate, expDate, foto, sessions: [], 
            currentStatus: "OUT", updatedAt: Date.now() 
        };  
        
        visitors[reg] = dataLocal;  
        addLocalLog(reg, "REGISTER");  
        secureSave();

        const payload = { action: "register", reg, nama, perusahaan, tujuan, pic, dept, startDate, expDate, kategori, photoBase64: foto, site_id: SITE_ID };
        const result = await apiCall(payload);  
        
        if (!result || result.status !== "success") {
            addToQueue("register", reg, payload); 
            toast(`⚠️ Masuk Antrean`, "warning"); 
        } else {
            toast(`✅ Sync Cloud Berhasil!`, "success");
        }

        generateQRandShow(reg, dataLocal); 
        ["regName", "regCompany", "regPic", "regDept", "regPhotoFile", "regCustomPurpose"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = "";
        });
        
        renderDashboard(); renderLogTable();  
        
    } catch (e) {  
        if (e.message !== "ValidationIncomplete") { console.error("Error:", e); toast("Sistem Error!", "error"); }
    } finally {  
        actionMutex = false; lockUI(false); 
    }  
};

// ================= NAVIGASI TAB (FIX MENTOK DASHBOARD) =================
function switchTab(tabId) {  
    console.log("Pindah ke:", tabId);
    const panes = ["dashboardPane", "registerPane", "scannerPane", "logsPane"];
    panes.forEach(p => {
        const el = document.getElementById(p);
        if (el) el.classList.remove("active-pane");
    });

    const targetPane = document.getElementById(tabId + "Pane");
    if (targetPane) targetPane.classList.add("active-pane");

    document.querySelectorAll(".nav-item").forEach(nav => { 
        if (nav.dataset.tab === tabId) nav.classList.add("active"); 
        else nav.classList.remove("active");
    });

    // Mobile Sidebar Close
    const side = document.getElementById("mobileSidebar");
    if (side) side.classList.remove("open");
    const over = document.getElementById("overlay");
    if (over) over.style.display = "none";
}  

document.querySelectorAll("[data-tab]").forEach(el => {
    el.onclick = () => switchTab(el.dataset.tab);
});

document.getElementById("mobileMenuBtn").onclick = () => { 
    document.getElementById("mobileSidebar").classList.add("open"); 
    document.getElementById("overlay").style.display = "block"; 
};

// ================= RENDER LOG TABLE (FIX COLUMN ERROR) =================
function renderLogTable() {
    try {
        const tbody = document.getElementById("logTableBody");
        if (!tbody) return;
        tbody.innerHTML = "";
        const displayLogs = [...logs].reverse();

        displayLogs.forEach((entry) => {
            const row = tbody.insertRow();
            // Total 8 Kolom (Index 0-7) - Pastikan HTML lo punya 8 kolom
            row.insertCell(0).innerHTML = `<input type="checkbox" class="logCheckItem" data-reg="${entry.reg}">`;
            row.insertCell(1).innerText = new Date(entry.timestamp).toLocaleString("id-ID");
            row.insertCell(2).innerText = entry.reg;
            const visitor = visitors[entry.reg] || {};
            row.insertCell(3).innerText = visitor.nama || "Unknown";
            row.insertCell(4).innerText = visitor.perusahaan || "-";
            let badge = entry.action.includes("IN") ? "bg-success" : (entry.action.includes("OUT") ? "bg-danger" : "bg-primary");
            row.insertCell(5).innerHTML = `<span class="badge ${badge}">${entry.action}</span>`;
            row.insertCell(6).innerText = visitor.pic || "-";
            row.insertCell(7).innerText = visitor.site_id || SITE_ID;
        });
    } catch (e) { console.error("renderLogTable error:", e); }
}

// Tambahan tombol pendukung
document.getElementById("refreshLogsBtn").onclick = () => { pullFromSheet(); renderLogTable(); };
document.getElementById("overlay").onclick = () => {
    document.getElementById("mobileSidebar").classList.remove("open");
    document.getElementById("overlay").style.display = "none";
};
